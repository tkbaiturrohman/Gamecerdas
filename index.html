<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Pintar Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; margin: 0; background: #f8fafc; touch-action: pan-y; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #view-game { background-size: cover; background-position: center; transition: background-image 0.5s ease-in-out; }
        
        /* UI Mobile App Modern */
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,1); box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,1); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.05); }
        
        /* Kartu Pilihan Jawaban Proporsional */
        .btn-pilihan { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-pilihan:active { transform: scale(0.92); border-color: #3b82f6; }
        
        /* Drag & Drop Halus */
        .kartu-drag { touch-action: none; user-select: none; transition: box-shadow 0.2s, transform 0.2s; }
        .is-dragging { opacity: 0.95; z-index: 9999 !important; transform: scale(1.05) !important; box-shadow: 0 15px 35px rgba(0,0,0,0.15); transition: none; }
        .drop-active { transform: scale(1.05); border-color: #0ea5e9 !important; background-color: #f0f9ff !important; box-shadow: inset 0 0 0 4px #bae6fd; }
        
        /* Animasi Ringan */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .anim-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes pulseSoft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .anim-pulse-soft { animation: pulseSoft 2s infinite ease-in-out; }
    </style>
</head>
<body>

    <div id="view-game" class="h-[100dvh] w-screen flex flex-col relative overflow-hidden bg-slate-50">
        
        <!-- Layar Mulai / Splash Screen -->
        <div id="layar-mulai" class="absolute inset-0 z-[100] bg-gradient-to-br from-sky-400 to-indigo-500 flex flex-col items-center justify-center p-6 text-center transition-all duration-500">
            <div class="bg-white/20 p-6 rounded-3xl backdrop-blur-sm mb-6 anim-pulse-soft shadow-xl border border-white/30">
                <i data-lucide="gamepad-2" class="w-16 h-16 text-white"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-white mb-2 tracking-tight">Belajar Cerdas</h1>
            <p class="text-sky-100 font-bold mb-10 text-sm md:text-base">Siap untuk petualangan seru?</p>
            <button onclick="Game.mulaiPilihLevel()" class="bg-white text-indigo-600 hover:bg-slate-50 font-black text-xl md:text-2xl py-4 px-12 rounded-full shadow-[0_6px_0_0_rgba(255,255,255,0.3)] active:translate-y-1 active:shadow-[0_0px_0_0_rgba(255,255,255,0)] transition-all w-full max-w-[250px]">
                MULAI
            </button>
        </div>

        <!-- Layar Peta Level (Menu) -->
        <div id="layar-pilih-level" class="hidden absolute inset-0 z-[90] bg-slate-50/95 backdrop-blur flex flex-col items-center justify-start overflow-y-auto">
            <div class="w-full bg-white px-6 pt-10 pb-4 shadow-sm sticky top-0 z-10 flex items-center justify-between">
                <h2 class="text-xl font-black text-slate-800">Pilih Level</h2>
                <button onclick="Game.tutupPilihLevel()" id="btn-tutup-level" class="hidden p-2 bg-slate-100 text-slate-600 rounded-full hover:bg-slate-200">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="w-full max-w-lg p-6">
                <div id="grid-level" class="grid grid-cols-4 sm:grid-cols-5 gap-3 sm:gap-4 content-start"></div>
            </div>
        </div>

        <!-- Floating Top Bar (Gaya Aplikasi Native) -->
        <header class="absolute top-3 left-3 right-3 z-20 flex justify-between items-center glass-nav rounded-full px-2 py-2">
            <div class="flex items-center gap-2">
                <button onclick="Game.bukaPilihLevel()" class="w-10 h-10 flex items-center justify-center bg-slate-100/50 text-slate-700 rounded-full active:scale-90 transition">
                    <i data-lucide="map" class="w-5 h-5"></i>
                </button>
                <div class="flex gap-0.5 px-2" id="ui-nyawa"></div>
            </div>
            
            <div class="font-black text-lg text-slate-800 absolute left-1/2 -translate-x-1/2">
                LVL <span id="ui-level" class="text-sky-500">1</span>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-1 bg-amber-100/70 px-3 py-1.5 rounded-full text-amber-600 font-black text-xs md:text-sm">
                    <i data-lucide="star" class="w-3.5 h-3.5 fill-amber-500"></i><span id="ui-skor">0</span>
                </div>
                <button onclick="AudioMgr.toggleMute()" id="btn-mute" class="w-10 h-10 flex items-center justify-center bg-slate-100/50 text-slate-700 rounded-full active:scale-90 transition">
                    <i data-lucide="volume-2" id="ikon-suara" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Area Bermain Utama -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden flex flex-col items-center justify-start px-4 pt-24 pb-6 w-full max-w-lg mx-auto z-10 relative">
            
            <!-- Kartu Pertanyaan (Elegan, ada tombol audionya) -->
            <div class="glass-card rounded-[1.5rem] p-4 w-full flex items-center gap-4 mb-6 anim-fade flex-shrink-0">
                <button onclick="AudioMgr.putarUlangSoal()" id="btn-suara-soal" class="hidden flex-shrink-0 w-12 h-12 flex items-center justify-center bg-sky-100 text-sky-600 rounded-full active:scale-90 transition-transform">
                    <i data-lucide="volume-2" id="ikon-baca-soal" class="w-6 h-6"></i>
                </button>
                <h2 id="teks-pertanyaan" class="text-base md:text-xl font-bold text-slate-800 leading-snug flex-1">Memuat soal...</h2>
            </div>
            
            <div id="arena-bermain" class="w-full flex-1 flex flex-col items-center justify-center min-h-0"></div>
        </main>

        <!-- Modal Pesan Akhir (Pop-up Clean) -->
        <div id="layar-pesan" class="hidden absolute inset-0 z-[80] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
            <div class="bg-white rounded-[2rem] p-6 max-w-xs w-full text-center shadow-2xl anim-fade relative overflow-hidden">
                <div id="pesan-ikon" class="mx-auto flex justify-center mb-3"></div>
                <h1 id="pesan-judul" class="text-2xl font-black mb-1 text-slate-800">...</h1>
                <p id="pesan-sub" class="text-slate-500 font-bold mb-6 text-xs md:text-sm">...</p>
                <div id="wadah-tombol-pesan" class="space-y-2.5"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ==========================================
        // MANAJEMEN AUDIO (Ducking Otomatis & Cerdas)
        // ==========================================
        const AudioMgr = {
            bgm: new Audio(), sfxBenar: new Audio(), sfxSalah: new Audio(), soal: new Audio(), 
            isMuted: false, urlSoalSaatIni: null,
            volumeNormalBGM: 0.3, volumePelanBGM: 0.05, // Ducking: BGM mengecil jadi 5% saat soal dibaca
            
            defBenar: 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3',
            defSalah: 'https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3',
            
            getAmanPath(url) {
                if(!url) return null;
                if(url.startsWith('http') || url.startsWith('data:')) return url;
                return `public/${url}`;
            },

            initGlobal(cfg) {
                if(cfg && cfg.bgm_url) { 
                    this.bgm.src = this.getAmanPath(cfg.bgm_url); 
                    this.bgm.loop = true; 
                    this.bgm.volume = this.volumeNormalBGM; 
                }
                // Jika suara soal selesai, kembalikan volume BGM ke normal
                this.soal.onended = () => {
                    this.fadeVolume(this.bgm, this.volumeNormalBGM, 600);
                    const ikon = document.getElementById('ikon-baca-soal');
                    if(ikon) ikon.classList.remove('animate-pulse', 'text-sky-400');
                };
            },

            setAudioLevel(dataLevel) {
                if (!dataLevel) return;
                
                if(dataLevel.bgm_level) {
                    const lBgm = this.getAmanPath(dataLevel.bgm_level);
                    if(!this.bgm.src.endsWith(lBgm.replace('public/',''))) {
                        this.bgm.src = lBgm;
                        if(!this.isMuted) this.bgm.play().catch(()=>{});
                    }
                }

                this.sfxBenar.src = dataLevel.sfx_benar ? this.getAmanPath(dataLevel.sfx_benar) : this.defBenar;
                this.sfxSalah.src = dataLevel.sfx_salah ? this.getAmanPath(dataLevel.sfx_salah) : this.defSalah;
                this.urlSoalSaatIni = dataLevel.audio_soal ? this.getAmanPath(dataLevel.audio_soal) : null;
                
                const btnSoal = document.getElementById('btn-suara-soal');
                if (this.urlSoalSaatIni) btnSoal.classList.remove('hidden');
                else btnSoal.classList.add('hidden');
            },

            toggleMute() {
                this.isMuted = !this.isMuted;
                this.bgm.muted = this.isMuted; this.sfxBenar.muted = this.isMuted;
                this.sfxSalah.muted = this.isMuted; this.soal.muted = this.isMuted;

                const ikon = document.getElementById('ikon-suara');
                const btn = document.getElementById('btn-mute');
                
                if(this.isMuted) {
                    ikon.setAttribute('data-lucide', 'volume-x');
                    btn.classList.replace('bg-slate-100/50', 'bg-red-100');
                    btn.classList.replace('text-slate-700', 'text-red-500');
                    this.stopSoal(); 
                } else {
                    ikon.setAttribute('data-lucide', 'volume-2');
                    btn.classList.replace('bg-red-100', 'bg-slate-100/50');
                    btn.classList.replace('text-red-500', 'text-slate-700');
                    if (this.bgm.src) { this.bgm.volume = this.volumeNormalBGM; this.bgm.play().catch(()=>{}); }
                }
                lucide.createIcons();
            },

            playBGM() { if(!this.isMuted && this.bgm.src) { this.bgm.volume = this.volumeNormalBGM; this.bgm.play().catch(()=>{}); } },
            playBenar() { this.stopSoal(); if(!this.isMuted && this.sfxBenar.src) { this.sfxBenar.currentTime=0; this.sfxBenar.play().catch(()=>{}); } },
            playSalah() { this.stopSoal(); if(!this.isMuted && this.sfxSalah.src) { this.sfxSalah.currentTime=0; this.sfxSalah.play().catch(()=>{}); } },
            
            playSoal() {
                this.soal.pause();
                if(!this.urlSoalSaatIni || this.isMuted) return;
                
                this.soal.src = this.urlSoalSaatIni;
                this.soal.play().then(() => {
                    // DUCKING AUDIO: Pelankan suara BGM secara halus
                    this.fadeVolume(this.bgm, this.volumePelanBGM, 400);
                    
                    const ikon = document.getElementById('ikon-baca-soal');
                    if(ikon) ikon.classList.add('animate-pulse', 'text-sky-400');
                }).catch(()=>{});
            },

            putarUlangSoal() { this.playSoal(); },

            stopSoal() {
                this.soal.pause(); this.soal.currentTime = 0;
                this.fadeVolume(this.bgm, this.volumeNormalBGM, 300); // Kembalikan suara BGM normal
                const ikon = document.getElementById('ikon-baca-soal');
                if(ikon) ikon.classList.remove('animate-pulse', 'text-sky-400');
            },

            fadeVolume(audioEl, targetVolume, durationMs) {
                if(!audioEl || isNaN(audioEl.duration)) return;
                const steps = 10; const stepTime = durationMs / steps;
                const volumeStep = (targetVolume - audioEl.volume) / steps;
                let currentStep = 0;
                
                const fadeInterval = setInterval(() => {
                    currentStep++;
                    let newVol = audioEl.volume + volumeStep;
                    if(newVol > 1) newVol = 1; if(newVol < 0) newVol = 0;
                    audioEl.volume = newVol;
                    if(currentStep >= steps) { audioEl.volume = targetVolume; clearInterval(fadeInterval); }
                }, stepTime);
            }
        };

        // ==========================================
        // LOGIKA DRAG & DROP (Tuning Mobile)
        // ==========================================
        interact('.kartu-drag').draggable({
            inertia: true,
            listeners: {
                start(e) { e.target.classList.add('is-dragging'); AudioMgr.stopSoal(); },
                move(e) {
                    var t = e.target;
                    var x = (parseFloat(t.getAttribute('data-x')) || 0) + e.dx;
                    var y = (parseFloat(t.getAttribute('data-y')) || 0) + e.dy;
                    t.style.transform = `translate(${x}px, ${y}px)`;
                    t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                },
                end(e) {
                    e.target.classList.remove('is-dragging');
                    if(!e.target.classList.contains('sudah-didrop')) {
                        e.target.style.transform = 'translate(0px, 0px)';
                        e.target.setAttribute('data-x', 0); e.target.setAttribute('data-y', 0);
                    }
                }
            }
        });

        interact('#zona-target').dropzone({
            accept: '.kartu-drag', overlap: 0.5,
            ondragenter(e) { e.target.classList.add('drop-active'); },
            ondragleave(e) { e.target.classList.remove('drop-active'); },
            ondrop: (e) => {
                e.target.classList.remove('drop-active');
                e.relatedTarget.classList.add('sudah-didrop');
                Game.cekJawaban(e.relatedTarget.getAttribute('data-benar') === 'ya', e.target);
            }
        });

        // ==========================================
        // ENGINE GAME LOGIC
        // ==========================================
        const Game = {
            db: { global: {}, levels: [] }, 
            levelSekarang: 0, skor: 0, nyawa: 3, 
            levelTerbuka: parseInt(localStorage.getItem('maxUnlockedLevel')) || 0,

            async mulaiPilihLevel() {
                const btnMulai = document.getElementById('layar-mulai');
                btnMulai.style.opacity = '0';
                setTimeout(() => btnMulai.classList.add('hidden'), 400);
                
                try {
                    const jsonUrl = `public/data-soal.json?v=${Date.now()}`;
                    const res = await fetch(jsonUrl);
                    if (!res.ok) throw new Error("Gagal mengambil data.json");
                    const data = await res.json();
                    
                    this.db.global = data.global_settings || {};
                    this.db.levels = data.levels || [];
                    if(this.db.levels.length === 0) throw new Error("Data Level Kosong");
                    
                    AudioMgr.initGlobal(this.db.global);
                } catch(e) {
                    this.db.levels = [{ 
                        kategori: "kuis", pertanyaan: "Belum ada soal, pastikan masuk ke Panel Admin!", 
                        item_target: { nama: "Saya Mengerti", isTarget: true }, item_pengecoh: [] 
                    }];
                }

                AudioMgr.playBGM();
                this.levelTerbuka = Math.min(this.levelTerbuka, Math.max(0, this.db.levels.length - 1));
                this.bukaPilihLevel(true);
            },

            bukaPilihLevel(isBaruBuka = false) {
                const layar = document.getElementById('layar-pilih-level');
                const grid = document.getElementById('grid-level');
                const btnTutup = document.getElementById('btn-tutup-level');
                
                AudioMgr.stopSoal();
                grid.innerHTML = '';
                if(isBaruBuka) btnTutup.classList.add('hidden');
                else btnTutup.classList.remove('hidden');

                if (!Array.isArray(this.db.levels)) this.db.levels = [];

                this.db.levels.forEach((lvl, idx) => {
                    const isUnlocked = idx <= this.levelTerbuka;
                    const btn = document.createElement('button');
                    
                    if(isUnlocked) {
                        btn.className = "bg-white border border-slate-200 text-slate-700 font-black text-lg py-4 rounded-[1.2rem] shadow-sm hover:border-sky-400 active:scale-95 transition-all flex flex-col items-center justify-center gap-1";
                        btn.innerHTML = `<span>${idx + 1}</span>${idx < this.levelTerbuka ? '<i data-lucide="star" class="w-3 h-3 fill-amber-400 text-amber-400"></i>' : '<div class="w-3 h-3"></div>'}`;
                        btn.onclick = () => { this.mainkanLevel(idx); };
                    } else {
                        btn.className = "bg-slate-100 border border-slate-200 text-slate-400 font-bold text-lg py-4 rounded-[1.2rem] flex flex-col items-center justify-center cursor-not-allowed gap-1";
                        btn.innerHTML = `<i data-lucide="lock" class="w-3 h-3 opacity-50"></i><span>${idx + 1}</span>`;
                    }
                    grid.appendChild(btn);
                });
                lucide.createIcons();
                layar.classList.remove('hidden');
            },

            tutupPilihLevel() { document.getElementById('layar-pilih-level').classList.add('hidden'); },

            mainkanLevel(idx) {
                this.tutupPilihLevel();
                this.levelSekarang = idx;
                this.nyawa = 3; 
                this.renderUI();
                this.muatArena();
            },

            simpanProgres() {
                if (this.levelSekarang >= this.levelTerbuka) {
                    this.levelTerbuka = Math.min(this.levelSekarang + 1, this.db.levels.length - 1);
                    localStorage.setItem('maxUnlockedLevel', this.levelTerbuka);
                }
            },

            renderUI() {
                document.getElementById('ui-skor').innerText = this.skor;
                const wadahNyawa = document.getElementById('ui-nyawa');
                wadahNyawa.innerHTML = '';
                for(let i=0; i<3; i++) wadahNyawa.innerHTML += `<i data-lucide="heart" class="w-4 h-4 ${i < this.nyawa ? 'fill-rose-500 text-rose-500' : 'text-slate-300'}"></i>`;
                lucide.createIcons();
            },

            muatArena() {
                const arena = document.getElementById('arena-bermain'); 
                arena.innerHTML = ''; 
                
                const dataLevel = this.db.levels[this.levelSekarang];
                if (!dataLevel) return;

                document.getElementById('ui-level').innerText = this.levelSekarang + 1;
                document.getElementById('teks-pertanyaan').innerText = dataLevel.pertanyaan || "Soal tanpa teks";

                const bgLayar = dataLevel.bg_image || this.db.global.bg_image;
                document.getElementById('view-game').style.backgroundImage = bgLayar ? `url('${AudioMgr.getAmanPath(bgLayar)}')` : 'none';
                
                AudioMgr.setAudioLevel(dataLevel);
                
                // Putar suara soal otomatis di awal level
                if(dataLevel.audio_soal) {
                    setTimeout(() => AudioMgr.playSoal(), 500); 
                }

                if(dataLevel.kategori === 'drag') this.mesinDrag(dataLevel, arena);
                else this.mesinKuis(dataLevel, arena);
            },

            mesinDrag(data, arena) {
                arena.innerHTML = `
                    <div id="zona-target" class="w-32 h-32 md:w-48 md:h-48 border-2 border-dashed border-sky-400 bg-sky-50/70 backdrop-blur-sm rounded-[1.5rem] flex flex-col items-center justify-center mb-auto mt-2 transition-colors z-0">
                        <i data-lucide="download" class="w-8 h-8 text-sky-400 mb-1"></i>
                        <span class="font-bold text-sky-600 text-xs">Taruh Sini</span>
                    </div>
                    <div id="wadah-item" class="w-full flex justify-center flex-wrap gap-3 pb-6 mt-8 anim-fade z-10"></div>
                `;
                lucide.createIcons();
                
                const wadahItem = document.getElementById('wadah-item');
                const target = data.item_target || { nama: "Target", isTarget: true };
                const pengecoh = Array.isArray(data.item_pengecoh) ? data.item_pengecoh : [];
                
                let itemsAcak = [target, ...pengecoh].sort(() => Math.random() - 0.5);

                itemsAcak.forEach(it => {
                    const el = document.createElement('div');
                    el.setAttribute('data-benar', it.isTarget ? 'ya' : 'tidak');
                    el.className = "kartu-drag w-20 h-20 md:w-28 md:h-28 bg-white rounded-2xl shadow-sm border border-slate-200 cursor-grab flex items-center justify-center overflow-hidden relative";
                    
                    const urlPath = it.url_gambar ? AudioMgr.getAmanPath(it.url_gambar) : '';
                    el.innerHTML = `
                        <div class="absolute inset-0 bg-slate-50 flex items-center justify-center text-slate-600 font-bold text-xs md:text-sm text-center p-1 leading-tight ${urlPath ? 'hidden' : ''}">${it.nama || '?'}</div>
                        <img src="${urlPath}" class="w-full h-full object-cover pointer-events-none" onerror="this.previousElementSibling.classList.remove('hidden'); this.style.display='none'" draggable="false" />
                    `;
                    wadahItem.appendChild(el);
                });
            },

            mesinKuis(data, arena) {
                const target = data.item_target || { nama: "Jawaban Benar", isTarget: true };
                const pengecoh = Array.isArray(data.item_pengecoh) ? data.item_pengecoh : [];
                let itemsAcak = [target, ...pengecoh].sort(() => Math.random() - 0.5);
                
                // Susunan GRID DINAMIS (Bisa 2 pilihan atau 4 pilihan rapi)
                const gridClass = itemsAcak.length > 2 ? "grid-cols-2" : "grid-cols-1 sm:grid-cols-2";
                
                const grid = document.createElement('div');
                grid.className = `grid ${gridClass} gap-3 w-full mt-auto pb-4 anim-fade`;
                
                itemsAcak.forEach(it => {
                    const btn = document.createElement('button');
                    btn.className = "btn-pilihan bg-white border-2 border-slate-100 text-slate-700 font-bold text-sm md:text-base p-3 rounded-2xl shadow-sm hover:border-sky-300 flex flex-col items-center justify-center gap-2 min-h-[100px] w-full";
                    
                    let konten = '';
                    const urlPath = it.url_gambar ? AudioMgr.getAmanPath(it.url_gambar) : '';
                    if(urlPath) konten += `<img src="${urlPath}" class="h-16 md:h-24 object-contain rounded-lg" onerror="this.style.display='none'" draggable="false">`;
                    if(it.nama) konten += `<span class="leading-tight text-center w-full">${it.nama}</span>`;
                    
                    btn.innerHTML = konten || "Pilihan";
                    btn.onclick = () => { AudioMgr.stopSoal(); this.cekJawaban(it.isTarget, btn); };
                    grid.appendChild(btn);
                });
                arena.appendChild(grid);
            },

            cekJawaban(isBenar, elemenAnimasi) {
                document.querySelectorAll('.kartu-drag').forEach(e => e.style.pointerEvents = 'none');
                document.querySelectorAll('button').forEach(e => e.disabled = true);

                if(isBenar) {
                    AudioMgr.playBenar(); this.skor += 100; this.simpanProgres(); this.renderUI();
                    elemenAnimasi.classList.add('bg-emerald-50', 'border-emerald-400', 'text-emerald-700');
                    elemenAnimasi.innerHTML += '<div class="absolute top-2 right-2 bg-emerald-100 rounded-full p-1"><i data-lucide="check" class="w-4 h-4 text-emerald-600"></i></div>';
                    lucide.createIcons();
                    setTimeout(() => this.munculLayarAkhir('benar'), 1000);
                } else {
                    AudioMgr.playSalah(); this.nyawa--; this.renderUI();
                    elemenAnimasi.classList.add('bg-rose-50', 'border-rose-400', 'text-rose-700');
                    setTimeout(() => this.munculLayarAkhir(this.nyawa <= 0 ? 'kalah' : 'salah'), 1000);
                }
            },

            munculLayarAkhir(status) {
                const layar = document.getElementById('layar-pesan'); 
                const ikon = document.getElementById('pesan-ikon');
                const judul = document.getElementById('pesan-judul'); 
                const sub = document.getElementById('pesan-sub');
                const wadahTombol = document.getElementById('wadah-tombol-pesan');
                
                layar.classList.remove('hidden');
                wadahTombol.innerHTML = '';

                if(status === 'benar') {
                    ikon.innerHTML = `<div class="bg-amber-100 p-3 rounded-full mb-1 inline-block"><i data-lucide="star" class="w-12 h-12 text-amber-500 fill-amber-400"></i></div>`;
                    judul.innerText = "Luar Biasa!"; 
                    judul.className = "text-xl font-black mb-0.5 text-slate-800";
                    
                    if(this.levelSekarang >= this.db.levels.length - 1) {
                        sub.innerText = `Skor Total: ${this.skor}\nSemua level selesai!`;
                        wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.bukaPilihLevel();" class="w-full bg-sky-500 text-white font-bold text-base py-3 rounded-xl active:scale-95 transition-transform">Pilih Level Lain</button>`;
                    } else {
                        sub.innerText = `Lanjut ke level berikutnya!`;
                        wadahTombol.innerHTML = `
                            <button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.mainkanLevel(Game.levelSekarang + 1);" class="w-full bg-sky-500 text-white font-bold text-base py-3 rounded-xl active:scale-95 transition-transform mb-2">Lanjut Level</button>
                            <button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.bukaPilihLevel();" class="w-full bg-slate-100 text-slate-600 font-bold text-sm py-2.5 rounded-xl hover:bg-slate-200">Peta Level</button>
                        `;
                    }
                } else if(status === 'salah') {
                    ikon.innerHTML = `<div class="bg-orange-100 p-3 rounded-full mb-1 inline-block"><i data-lucide="refresh-ccw" class="w-10 h-10 text-orange-500"></i></div>`;
                    judul.innerText = "Aduh Salah"; 
                    judul.className = "text-xl font-black mb-0.5 text-slate-800";
                    sub.innerText = "Tidak apa-apa, ayo coba lagi!";
                    wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.muatArena();" class="w-full bg-sky-500 text-white font-bold text-base py-3 rounded-xl active:scale-95 transition-transform">Coba Lagi</button>`;
                } else {
                    ikon.innerHTML = `<div class="bg-rose-100 p-3 rounded-full mb-1 inline-block"><i data-lucide="heart-crack" class="w-12 h-12 text-rose-500"></i></div>`;
                    judul.innerText = "Game Over"; 
                    judul.className = "text-xl font-black mb-0.5 text-slate-800";
                    sub.innerText = `Skor Terakhir: ${this.skor}`;
                    wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.bukaPilihLevel();" class="w-full bg-slate-800 text-white font-bold text-base py-3 rounded-xl active:scale-95 transition-transform">Kembali ke Menu</button>`;
                }
                lucide.createIcons();
            }
        };
    </script>
</body>
</html>
