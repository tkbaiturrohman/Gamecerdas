<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Edukasi Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; margin: 0; background: #f8fafc; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #view-game { background-size: cover; background-position: center; transition: background-image 0.5s ease-in-out; touch-action: none; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,1); box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,1); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.05); }
        
        .btn-pilihan { transition: transform 0.1s; cursor: pointer; } .btn-pilihan:active { transform: scale(0.92); border-color: #3b82f6; }
        
        .kartu-drag { touch-action: none; user-select: none; position: relative; z-index: 10; cursor: grab; will-change: left, top, transform; }
        .is-dragging { opacity: 0.95; z-index: 999999 !important; box-shadow: 0 25px 50px rgba(0,0,0,0.35); transform: scale(1.15) !important; cursor: grabbing; }
        
        .zona-drop { transition: all 0.2s; }
        .drop-hover { border-color: #0ea5e9 !important; background-color: #e0f2fe !important; box-shadow: inset 0 0 0 4px #bae6fd; transform: scale(1.05); }
        .terkunci { pointer-events: none !important; opacity: 1 !important; transform: translate3d(0,0,0) scale(1) !important; box-shadow: none !important; transition: none !important; }

        .mem-card { perspective: 1000px; cursor: pointer; touch-action: manipulation; }
        .mem-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .mem-card.flipped .mem-inner { transform: rotateY(180deg); }
        .mem-front, .mem-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mem-front { background: #38bdf8; display: flex; align-items: center; justify-content: center; border: 4px solid #fff; }
        .mem-back { transform: rotateY(180deg); overflow: hidden; }

        .objek-terbang { position: absolute; cursor: pointer; user-select: none; touch-action: none; will-change: transform; z-index: 25; transition: transform 0.1s; }
        .objek-terbang:active { transform: scale(0.85) !important; }

        .bayangan-hitam { filter: brightness(0) drop-shadow(0 4px 4px rgba(0,0,0,0.4)); opacity: 0.8; pointer-events: none; }
        .lubang-pukul { overflow: hidden; position: relative; background: #cbd5e1; border-radius: 50%; border-bottom: 8px solid #94a3b8; touch-action: manipulation; }
        .benda-pukul { position: absolute; bottom: -100%; left: 5%; right: 5%; height: 95%; transition: bottom 0.15s ease-out; cursor: pointer; z-index: 20; touch-action: manipulation; }
        .benda-pukul.muncul { bottom: 0; }
        .benda-pukul:active { transform: scale(0.9); }

        .toast-enter { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .toast-leave { animation: popOut 0.2s ease-in forwards; }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes popOut { from { transform: translate(-50%, -50%) scale(1); opacity: 1; } to { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .anim-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes pulseSoft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .anim-pulse-soft { animation: pulseSoft 2s infinite ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .anim-shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div id="toast-container" class="fixed top-1/2 left-1/2 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div id="view-game" class="h-[100dvh] w-screen flex flex-col relative overflow-hidden bg-slate-50">
        
        <div id="layar-mulai" class="absolute inset-0 z-[100] bg-gradient-to-br from-sky-400 to-indigo-500 flex flex-col items-center justify-center p-6 text-center transition-all duration-500">
            <div class="bg-white/20 p-6 rounded-3xl backdrop-blur-sm mb-6 anim-pulse-soft shadow-xl border border-white/30">
                <i data-lucide="gamepad-2" class="w-16 h-16 text-white"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-white mb-2 tracking-tight">Belajar Cerdas</h1>
            <div id="loading-bar-container" class="w-full max-w-xs bg-white/30 rounded-full h-4 mb-6 mt-4 overflow-hidden relative">
                <div id="loading-bar-fill" class="bg-yellow-400 h-full w-0 transition-all duration-100 ease-linear"></div>
                <div id="loading-text" class="absolute inset-0 flex items-center justify-center text-[10px] font-black text-indigo-900">0%</div>
            </div>
            <button id="btn-mulai" onclick="Game.mulai()" class="hidden bg-white text-indigo-600 hover:bg-slate-50 font-black text-2xl py-4 px-12 rounded-full shadow-[0_6px_0_0_rgba(255,255,255,0.3)] active:translate-y-1 transition-all w-full max-w-[250px]">MULAI MAIN</button>
        </div>

        <div id="layar-pilih-level" class="hidden absolute inset-0 z-[90] bg-slate-50/95 backdrop-blur flex flex-col items-center justify-start overflow-y-auto pb-10">
            <div class="w-full bg-white px-6 pt-10 pb-4 shadow-sm sticky top-0 z-10 flex items-center justify-between">
                <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">Peta Level</h2>
                <div class="flex gap-2">
                    <button onclick="Game.tarikDataBaru()" class="bg-emerald-100 text-emerald-600 p-2 rounded-xl active:scale-90 shadow-sm flex items-center gap-1" title="Tarik Data Terbaru"><i data-lucide="refresh-cw" id="ikon-sync" class="w-4 h-4"></i> <span class="text-xs font-bold">Update</span></button>
                    <button onclick="Game.tutupPilihLevel()" id="btn-tutup-level" class="hidden p-2 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
            </div>
            <div id="sync-progress" class="hidden w-full bg-slate-200 h-4 relative shadow-inner">
                <div id="sync-bar" class="bg-emerald-500 h-full w-0 transition-all duration-200 ease-out"></div>
                <div id="sync-text" class="absolute inset-0 flex items-center justify-center text-[10px] font-black text-slate-700 drop-shadow-sm">0%</div>
            </div>
            <div class="w-full max-w-lg p-6">
                <div id="grid-level" class="grid grid-cols-4 sm:grid-cols-5 gap-3 sm:gap-4 content-start"></div>
            </div>
        </div>

        <header class="absolute top-3 left-3 right-3 z-20 flex justify-between items-center glass-nav rounded-full px-2 py-2">
            <div class="flex items-center gap-2">
                <button onclick="Game.bukaPilihLevel()" class="w-10 h-10 flex items-center justify-center bg-slate-100/50 text-slate-700 rounded-full active:scale-90 transition"><i data-lucide="map" class="w-5 h-5"></i></button>
                <div class="flex gap-0.5 px-2" id="ui-nyawa"></div>
            </div>
            <div class="font-black text-lg text-slate-800 absolute left-1/2 -translate-x-1/2">LVL <span id="ui-level" class="text-sky-500">1</span></div>
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-1 bg-amber-100/70 px-3 py-1.5 rounded-full text-amber-600 font-black text-xs md:text-sm"><i data-lucide="star" class="w-3.5 h-3.5 fill-amber-500"></i><span id="ui-skor">0</span></div>
                <button onclick="AudioMgr.toggleMute()" id="btn-mute" class="w-10 h-10 flex items-center justify-center bg-slate-100/50 text-slate-700 rounded-full active:scale-90 transition"><i data-lucide="volume-2" id="ikon-suara" class="w-5 h-5"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-visible flex flex-col items-center justify-start px-4 pt-20 pb-6 w-full max-w-2xl mx-auto z-10 relative">
            <div class="glass-card rounded-[1.5rem] p-4 w-full flex flex-col items-center mb-2 anim-fade flex-shrink-0 z-20 pointer-events-auto">
                <div class="w-full flex items-center justify-between gap-3">
                    <button onclick="AudioMgr.putarUlangSoal()" id="btn-suara-soal" class="hidden flex-shrink-0 w-12 h-12 flex items-center justify-center bg-sky-100 text-sky-600 rounded-full active:scale-90 transition-transform shadow-sm"><i data-lucide="volume-2" id="ikon-baca-soal" class="w-6 h-6"></i></button>
                    <h2 id="teks-pertanyaan" class="text-base md:text-lg font-bold text-slate-800 leading-snug flex-1 text-center">Memuat...</h2>
                </div>
                <div id="media-soal" class="w-full max-h-24 mt-2 rounded-xl overflow-hidden hidden flex justify-center bg-slate-100">
                    <img id="img-soal" src="" class="h-full object-contain pointer-events-none">
                </div>
            </div>
            <div id="arena-bermain" class="w-full flex-1 flex flex-col items-center justify-center min-h-0 relative"></div>
        </main>

        <div id="layar-pesan" class="hidden absolute inset-0 z-[80] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6">
            <div class="bg-white rounded-[2rem] p-8 max-w-xs w-full text-center shadow-2xl anim-fade relative overflow-hidden">
                <div id="pesan-ikon" class="mx-auto flex justify-center mb-4"></div>
                <h1 id="pesan-judul" class="text-3xl font-black mb-1 text-slate-800">...</h1>
                <p id="pesan-sub" class="text-slate-500 font-bold mb-8 text-sm">...</p>
                <div id="wadah-tombol-pesan" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function uiToast(msg, type='success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-enter absolute px-6 py-3 rounded-full font-black text-sm shadow-2xl flex items-center justify-center gap-2 whitespace-nowrap ${type==='success' ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`;
            toast.innerHTML = `<i data-lucide="${type==='success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5"></i> ${msg}`;
            container.appendChild(toast); lucide.createIcons();
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-leave'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // CONFETTI EFEK
        function lemparConfetti() {
            const warna = ['#f87171', '#60a5fa', '#facc15', '#34d399', '#a78bfa'];
            for(let i = 0; i < 40; i++) {
                let c = document.createElement('div');
                c.className = 'absolute w-3 h-3 rounded-sm z-[999999] pointer-events-none';
                c.style.backgroundColor = warna[Math.floor(Math.random() * warna.length)];
                c.style.left = '50%'; c.style.top = '30%';
                
                let vx = (Math.random() - 0.5) * 30; let vy = (Math.random() - 1) * 20; let rot = Math.random() * 360;
                document.body.appendChild(c);
                let step = 0;
                let anim = setInterval(() => {
                    step++; vy += 1; rot += 5; 
                    c.style.transform = `translate(${vx * step}px, ${vy * step}px) rotate(${rot}deg)`;
                    c.style.opacity = 1 - (step / 50);
                    if(step > 50) { clearInterval(anim); c.remove(); }
                }, 30);
            }
        }

        // MESIN DRAG ABSOLUT
        function aplikasikanDrag(el) {
            let isDragging = false; let startX, startY, awalLeft, awalTop, parentAwal, placeholder;

            const onStart = (e) => {
                if (el.classList.contains('terkunci')) return;
                if (e.type === 'touchstart' && e.cancelable) e.preventDefault();
                isDragging = true; AudioMgr.stopSoal(); parentAwal = el.parentElement;

                const pos = e.touches ? e.touches[0] : e; const rect = el.getBoundingClientRect();
                placeholder = document.createElement('div'); placeholder.style.width = rect.width + 'px'; placeholder.style.height = rect.height + 'px'; placeholder.style.display = 'inline-block';
                parentAwal.insertBefore(placeholder, el);

                document.body.appendChild(el);
                el.style.position = 'fixed'; el.style.left = rect.left + 'px'; el.style.top = rect.top + 'px'; el.style.margin = '0'; el.style.zIndex = '999999';
                el.classList.add('is-dragging');
                startX = pos.clientX; startY = pos.clientY; awalLeft = rect.left; awalTop = rect.top;

                document.addEventListener('touchmove', onMove, {passive: false}); document.addEventListener('mousemove', onMove, {passive: false});
                document.addEventListener('touchend', onEnd); document.addEventListener('mouseup', onEnd);
            };

            const onMove = (e) => {
                if (!isDragging) return;
                if (e.cancelable) e.preventDefault(); 
                const pos = e.touches ? e.touches[0] : e;
                el.style.left = (awalLeft + (pos.clientX - startX)) + 'px'; el.style.top = (awalTop + (pos.clientY - startY)) + 'px';
                el.style.pointerEvents = 'none'; const elemenBawah = document.elementFromPoint(pos.clientX, pos.clientY); el.style.pointerEvents = 'auto';

                document.querySelectorAll('.zona-drop').forEach(z => z.classList.remove('drop-hover'));
                if(elemenBawah) { const zona = elemenBawah.closest('.zona-drop'); if(zona) zona.classList.add('drop-hover'); }
            };

            const onEnd = (e) => {
                if (!isDragging) return; isDragging = false;
                document.removeEventListener('touchmove', onMove); document.removeEventListener('mousemove', onMove); document.removeEventListener('touchend', onEnd); document.removeEventListener('mouseup', onEnd);
                el.classList.remove('is-dragging');

                const pos = e.changedTouches ? e.changedTouches[0] : e;
                el.style.pointerEvents = 'none'; const elemenBawah = document.elementFromPoint(pos.clientX, pos.clientY); el.style.pointerEvents = 'auto';

                const zona = elemenBawah ? elemenBawah.closest('.zona-drop') : null;
                document.querySelectorAll('.zona-drop').forEach(z => z.classList.remove('drop-hover'));

                if(zona) {
                    if(placeholder && placeholder.parentNode) placeholder.remove();
                    el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0'; el.style.zIndex = '10';
                    Game.prosesDropItem(el, zona, parentAwal);
                } else {
                    if(placeholder && placeholder.parentNode) {
                        const pRect = placeholder.getBoundingClientRect(); el.style.transition = 'all 0.3s ease-out'; el.style.left = pRect.left + 'px'; el.style.top = pRect.top + 'px';
                        setTimeout(() => { el.style.transition = ''; el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0'; el.style.zIndex = '10';
                            if(placeholder.parentNode) { placeholder.parentNode.insertBefore(el, placeholder); placeholder.remove(); }
                        }, 300);
                    } else {
                        el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0'; el.style.zIndex = '10'; parentAwal.appendChild(el);
                    }
                }
            };

            el.addEventListener('touchstart', onStart, {passive: false}); el.addEventListener('mousedown', onStart, {passive: false});
        }

        // ==========================================
        // AUDIO MANAGER (DENGAN JEDA 5 DETIK)
        // ==========================================
        const AudioMgr = {
            bgm: new Audio(), sfxBenar: new Audio(), sfxSalah: new Audio(), soal: new Audio(), 
            isMuted: false, urlSoalSaatIni: null,
            volumeNormalBGM: 0.3, volumePelanBGM: 0.05, 
            playCountTarget: 1, currentPlay: 0,
            
            defBenar: 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3',
            defSalah: 'https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3',
            
            getAmanPath(url) { if(!url) return null; if(url.startsWith('http') || url.startsWith('data:')) return url; return `public/${url}`; },
            
            initGlobal(cfg) {
                if(cfg && cfg.bgm_url) { this.bgm.src = this.getAmanPath(cfg.bgm_url); this.bgm.loop = true; this.bgm.volume = this.volumeNormalBGM; }
                
                // EVENT LOOP UNTUK SOAL DENGAN JEDA 5 DETIK
                this.soal.onended = () => { 
                    this.currentPlay++;
                    if (this.currentPlay < this.playCountTarget) {
                        // Menunggu 5 detik sebelum putar ulang agar anak bisa berpikir
                        setTimeout(() => {
                            if (!this.isMuted && this.urlSoalSaatIni) { 
                                this.soal.play().catch(()=>{}); 
                            }
                        }, 5000); 
                    } else {
                        this.fadeVolume(this.bgm, this.volumeNormalBGM, 800); 
                        const ikon = document.getElementById('ikon-baca-soal'); if(ikon) ikon.classList.remove('animate-pulse', 'text-sky-400'); 
                    }
                };
            },
            
            setAudioLevel(dataLevel) {
                if (!dataLevel) return;
                if(dataLevel.bgm_level) {
                    const lBgm = this.getAmanPath(dataLevel.bgm_level);
                    if(!this.bgm.src.endsWith(lBgm.replace('public/',''))) { 
                        this.bgm.src = lBgm; 
                        this.bgm.loop = dataLevel.bgm_loop === undefined ? true : (dataLevel.bgm_loop === 'ya');
                        if(!this.isMuted) this.bgm.play().catch(()=>{}); 
                    }
                } else {
                    this.bgm.loop = true;
                }

                this.sfxBenar.src = dataLevel.sfx_benar ? this.getAmanPath(dataLevel.sfx_benar) : this.defBenar;
                this.sfxSalah.src = dataLevel.sfx_salah ? this.getAmanPath(dataLevel.sfx_salah) : this.defSalah;
                this.urlSoalSaatIni = dataLevel.audio_soal ? this.getAmanPath(dataLevel.audio_soal) : null;
                const btnSoal = document.getElementById('btn-suara-soal');
                if (this.urlSoalSaatIni) btnSoal.classList.remove('hidden'); else btnSoal.classList.add('hidden');
            },

            toggleMute() {
                this.isMuted = !this.isMuted; this.bgm.muted = this.isMuted; this.sfxBenar.muted = this.isMuted; this.sfxSalah.muted = this.isMuted; this.soal.muted = this.isMuted;
                const ikon = document.getElementById('ikon-suara'); const btn = document.getElementById('btn-mute');
                if(this.isMuted) { ikon.setAttribute('data-lucide', 'volume-x'); btn.classList.replace('bg-slate-100/50', 'bg-red-100'); btn.classList.replace('text-slate-700', 'text-red-500'); this.stopSoal(); 
                } else { ikon.setAttribute('data-lucide', 'volume-2'); btn.classList.replace('bg-red-100', 'bg-slate-100/50'); btn.classList.replace('text-red-500', 'text-slate-700'); if (this.bgm.src) { this.bgm.volume = this.volumeNormalBGM; this.bgm.play().catch(()=>{}); } }
                lucide.createIcons();
            },

            playBGM() { if(!this.isMuted && this.bgm.src) { this.bgm.volume = this.volumeNormalBGM; this.bgm.play().catch(()=>{}); } },
            playBenar() { this.stopSoal(); if(!this.isMuted && this.sfxBenar.src) { this.sfxBenar.currentTime=0; this.sfxBenar.play().catch(()=>{}); } },
            playSalah() { this.stopSoal(); if(!this.isMuted && this.sfxSalah.src) { this.sfxSalah.currentTime=0; this.sfxSalah.play().catch(()=>{}); } },
            
            playSoal(count = 1) {
                this.soal.pause(); if(!this.urlSoalSaatIni || this.isMuted) return;
                this.soal.src = this.urlSoalSaatIni;
                this.playCountTarget = count;
                this.currentPlay = 0;
                this.soal.play().then(() => {
                    this.fadeVolume(this.bgm, this.volumePelanBGM, 400);
                    const ikon = document.getElementById('ikon-baca-soal'); if(ikon) ikon.classList.add('animate-pulse', 'text-sky-400');
                }).catch(()=>{});
            },

            putarUlangSoal() { this.playSoal(this.playCountTarget); },
            stopSoal() {
                this.soal.pause(); this.soal.currentTime = 0; this.fadeVolume(this.bgm, this.volumeNormalBGM, 300);
                const ikon = document.getElementById('ikon-baca-soal'); if(ikon) ikon.classList.remove('animate-pulse', 'text-sky-400');
            },

            fadeVolume(audioEl, targetVolume, durationMs) {
                if(!audioEl || isNaN(audioEl.duration)) return;
                const steps = 10; const stepTime = durationMs / steps; const volumeStep = (targetVolume - audioEl.volume) / steps; let currentStep = 0;
                const fadeInterval = setInterval(() => {
                    currentStep++; let newVol = audioEl.volume + volumeStep;
                    if(newVol > 1) newVol = 1; if(newVol < 0) newVol = 0; audioEl.volume = newVol;
                    if(currentStep >= steps) { audioEl.volume = targetVolume; clearInterval(fadeInterval); }
                }, stepTime);
            }
        };

        // ENGINE FISIKA BUBBLE & MELAYANG
        const PhysicsEngine = {
            rafId: null, objects: [], arena: null, mode: null,
            start(mode, kecepatan, itemAcak, arenaEl, isTransparan) {
                this.stop(); this.arena = arenaEl; this.mode = mode; this.objects = [];
                let speedMult = kecepatan === 'cepat' ? 3.0 : (kecepatan === 'lambat' ? 1.0 : 1.8);
                const rect = this.arena.getBoundingClientRect();
                const totalItems = mode === 'bubble' ? 12 : itemAcak.length; 

                for(let i=0; i<totalItems; i++) {
                    let it = itemAcak[i % itemAcak.length]; 
                    if(mode === 'bubble' && i%3===0) it = itemAcak.find(a => a.isTarget) || itemAcak[0];

                    const el = document.createElement('div');
                    const bgClass = isTransparan ? 'bg-transparent' : (mode==='bubble' ? 'bg-white/90 backdrop-blur border-2 border-sky-300' : 'bg-white border-2 border-indigo-200');
                    el.className = `objek-terbang flex flex-col items-center justify-center shadow-lg overflow-hidden rounded-full p-2 ${bgClass}`;
                    
                    const size = mode === 'bubble' ? (Math.random() * 25 + 65) : 80;
                    el.style.width = `${size}px`; el.style.height = `${size}px`;
                    
                    let px = Math.random() * (rect.width - size);
                    let py = mode === 'bubble' ? -(Math.random() * 800) - size : Math.random() * (rect.height - size);
                    if(mode === 'melayang') { px = Math.max(10, Math.min(px, rect.width - size - 10)); py = Math.max(10, Math.min(py, rect.height - size - 10)); }
                    
                    el.style.left = `0px`; el.style.top = `0px`; el.style.transform = `translate3d(${px}px, ${py}px, 0)`;

                    const urlPath = it.url_gambar ? AudioMgr.getAmanPath(it.url_gambar) : '';
                    el.innerHTML = Game.generateGambarHtml(it, urlPath, "text-[9px]", isTransparan);

                    el.onpointerdown = (e) => { e.preventDefault(); e.stopPropagation(); AudioMgr.stopSoal(); Game.prosesKetuk(it, el, mode); };
                    this.arena.appendChild(el);
                    
                    const angle = Math.random() * Math.PI * 2;
                    this.objects.push({

            loop() {

            },

            mesinMemory(data, arena) {
                this.memoriFlipped = []; this.memoriMatched = 0; let itemUnik = []; if (data.item_target && (data.item_target.url_gambar || data.item_target.nama)) itemUnik.push(data.item_target); if (data.item_pengecoh) data.item_pengecoh.forEach(p => { if(p.url_gambar || p.nama) itemUnik.push(p); }); if(itemUnik.length < 2) return arena.innerHTML = `<div class="text-rose-500 font-bold p-4 bg-rose-50 rounded-xl">Admin: Butuh minimal 2 gambar berbeda!</div>`; let pasangan = [...itemUnik, ...itemUnik].sort(() => Math.random() - 0.5); const totalPairs = itemUnik.length; const gridClass = pasangan.length > 6 ? "grid-cols-4" : "grid-cols-3"; const grid = document.createElement('div'); grid.className = `grid ${gridClass} gap-2 w-full mt-auto pb-4 anim-fade max-w-sm`;
                const isT = data.is_transparent_box === 'ya';
                pasangan.forEach((it, index) => {
                    const card = document.createElement('div'); card.className = "mem-card w-full aspect-square"; const urlPath = it.url_gambar ? AudioMgr.getAmanPath(it.url_gambar) : ''; const namaAsli = it.nama || ''; const idUnik = `${namaAsli}-${urlPath}-${it.isTarget ? 'T' : 'P'}`; card.innerHTML = `<div class="mem-inner" data-id="${idUnik}"><div class="mem-front"><i data-lucide="help-circle" class="w-6 h-6 md:w-8 md:h-8 text-white"></i></div><div class="mem-back flex items-center justify-center p-1 ${isT ? 'bg-transparent border-none' : 'bg-slate-50 border-4 border-white'} relative overflow-hidden">${this.generateGambarHtml(it, urlPath, "text-[9px]", isT)}</div></div>`; card.onpointerdown = (e) => { e.preventDefault(); this.flipMemoryCard(card.querySelector('.mem-inner'), totalPairs); }; grid.appendChild(card);
                }); arena.appendChild(grid); lucide.createIcons();
            },

            mesinBubble(data, arena) {
                const target = data.item_target || { nama: "Benar", isTarget: true }; const pengecoh = Array.isArray(data.item_pengecoh) ? data.item_pengecoh : []; let itemAcak = [target, ...pengecoh]; const kecepatan = data.speed || 'normal';
                this.totalJawaban = data.target_count || 1;
                const isT = data.is_transparent_box === 'ya';
                arena.innerHTML = `<p class="text-xs text-sky-600 font-bold mb-2 z-10 bg-white/70 px-3 py-1 rounded-full pointer-events-none drop-shadow-sm">Pecahkan <span class="text-rose-500">${this.totalJawaban}x</span> Gelembung yang Benar!</p>`;
                PhysicsEngine.start('bubble', kecepatan, itemAcak, arena, isT);
            },

            mesinMelayang(data, arena) {
                const arrUrutan = (data.item_urutan || []).map((it, idx) => { it.indexAsli = it.indexAsli ?? idx; return it; }); this.totalJawaban = arrUrutan.length; const kecepatan = data.speed || 'normal';
                const isT = data.is_transparent_box === 'ya';
                arena.innerHTML = `<p class="text-xs text-sky-600 font-bold mb-2 z-10 bg-white/70 px-3 py-1 rounded-full pointer-events-none">Tekan sesuai urutan (1, 2, 3..)</p>`;
                PhysicsEngine.start('melayang', kecepatan, arrUrutan, arena, isT);
            },

            mesinPukul(data, arena) {
                const target = data.item_target || { nama: "Benar", isTarget: true }; const pengecoh = Array.isArray(data.item_pengecoh) ? data.item_pengecoh : []; let itemAcak = [target, ...pengecoh]; const kecepatan = data.speed || 'normal'; let speedMs = kecepatan === 'cepat' ? 800 : (kecepatan === 'lambat' ? 1800 : 1200);
                this.totalJawaban = data.target_count || 3; 
                const isT = data.is_transparent_box === 'ya';

                arena.innerHTML = `<p class="text-xs text-sky-600 font-bold mb-2 z-10 bg-white/70 px-3 py-1 rounded-full drop-shadow-sm">Pukul gambar yang benar <span class="text-rose-500">${this.totalJawaban}x</span>!</p><div class="grid grid-cols-3 gap-3 w-full max-w-sm mt-auto pb-10" id="wadah-lubang"></div>`;
                const wadahLubang = document.getElementById('wadah-lubang'); let lubangs = [];
                for(let i=0; i<6; i++) {
                    const lubang = document.createElement('div'); lubang.className = "lubang-pukul aspect-square w-full";
                    const benda = document.createElement('div'); benda.className = `benda-pukul flex flex-col items-center justify-center ${isT ? 'bg-transparent border-none' : 'bg-white border-4 border-indigo-300 shadow-inner'} rounded-t-full p-1 overflow-hidden`;
                    
                    benda.onpointerdown = (e) => {
                        e.stopPropagation(); e.preventDefault(); if(!benda.classList.contains('muncul')) return; 
                        const isTarget = benda.getAttribute('data-is-target') === 'true'; benda.classList.remove('muncul');
                        if(isTarget) {
                            AudioMgr.playBenar(); this.jawabanSaatIni++; this.tambahSkor(50); this.renderUI();
                            if(this.jawabanSaatIni >= this.totalJawaban) { PhysicsEngine.stop(); setTimeout(() => this.munculLayarAkhir('benar'), 500); }
                        } else {
                            AudioMgr.playSalah(); this.nyawa--; this.renderUI();
                            if(this.nyawa <= 0) { PhysicsEngine.stop(); setTimeout(() => this.munculLayarAkhir('kalah'), 500); }
                        }
                    };
                    lubang.appendChild(benda); wadahLubang.appendChild(lubang); lubangs.push(benda);
                }

                PhysicsEngine.stop();
                PhysicsEngine.rafId = setInterval(() => { 
                    lubangs.forEach(b => b.classList.remove('muncul')); const numToPop = Math.random() > 0.5 ? 2 : 1; const shuffledLubang = [...lubangs].sort(() => 0.5 - Math.random()).slice(0, numToPop);
                    shuffledLubang.forEach((benda, idx) => {
                        let it = itemAcak[Math.floor(Math.random() * itemAcak.length)]; if(idx === 0 && Math.random() > 0.3) it = target; 
                        const urlPath = it.url_gambar ? AudioMgr.getAmanPath(it.url_gambar) : '';
                        benda.innerHTML = this.generateGambarHtml(it, urlPath, "text-[10px]", isT); benda.setAttribute('data-is-target', it.isTarget ? 'true' : 'false'); benda.classList.add('muncul');
                    });
                }, speedMs);
            },

            munculLayarAkhir(status) {
                PhysicsEngine.stop(); const layar = document.getElementById('layar-pesan'); const ikon = document.getElementById('pesan-ikon'); const judul = document.getElementById('pesan-judul'); const sub = document.getElementById('pesan-sub'); const wadahTombol = document.getElementById('wadah-tombol-pesan'); layar.classList.remove('hidden'); wadahTombol.innerHTML = '';
                
                // SKOR CERDAS: Mencatat level yang baru diselesaikan ini ke dalam histori sesi (agar tidak bisa farming skor)
                if (status === 'benar' && this.bisaDapatSkor) {
                    this.levelsEarnedScore.push(this.levelSekarang);
                }

                if(status === 'benar') {
                    lemparConfetti(); ikon.innerHTML = `<div class="bg-amber-100 p-3 rounded-full mb-1 inline-block"><i data-lucide="star" class="w-12 h-12 text-amber-500 fill-amber-400"></i></div>`; judul.innerText = "Luar Biasa!"; judul.className = "text-2xl font-black mb-0.5 text-slate-800";
                    if(this.levelSekarang >= this.db.levels.length - 1) { sub.innerText = `Skor Total: ${this.skor}\nSemua level selesai!`; wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.bukaPilihLevel();" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold text-lg py-3.5 rounded-xl shadow-sm transition-all">Pilih Level Lain</button>`; } else { sub.innerText = `Lanjut ke level berikutnya!`; wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.mainkanLevel(Game.levelSekarang + 1);" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold text-lg py-3.5 rounded-xl shadow-sm transition-all mb-2">Lanjut Level</button><button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.bukaPilihLevel();" class="w-full bg-slate-100 text-slate-600 font-bold text-sm py-2.5 rounded-xl hover:bg-slate-200">Peta Level</button>`; }
                } else if(status === 'salah') {
                    ikon.innerHTML = `<div class="bg-orange-100 p-3 rounded-full mb-1 inline-block"><i data-lucide="refresh-ccw" class="w-10 h-10 text-orange-500"></i></div>`; judul.innerText = "Aduh Salah"; judul.className = "text-2xl font-black mb-0.5 text-slate-800"; sub.innerText = "Tidak apa-apa, ayo coba lagi!"; wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.muatArena();" class="w-full bg-sky-500 text-white font-bold text-lg py-3.5 rounded-xl shadow-sm transition-all">Coba Lagi</button>`;
                } else {
                    ikon.innerHTML = `<div class="bg-rose-100 p-3 rounded-full mb-1 inline-block"><i data-lucide="heart-crack" class="w-12 h-12 text-rose-500"></i></div>`; judul.innerText = "Game Over"; judul.className = "text-2xl font-black mb-0.5 text-slate-800"; sub.innerText = `Skor Terakhir: ${this.skor}`;
                    wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.resetGame(); Game.bukaPilihLevel();" class="w-full bg-slate-800 text-white font-bold text-base py-3 rounded-xl active:scale-95 transition-transform">Lanjut (Reset Poin)</button>`;
                } lucide.createIcons();
            }
        };

        document.addEventListener('DOMContentLoaded', () => { Game.initPreload(); });
    </script>
</body>
</html>
