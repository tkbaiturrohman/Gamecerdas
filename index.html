<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Pintar Edukasi TK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; margin: 0; background: #f8fafc; touch-action: pan-y; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #view-game { background-size: cover; background-position: center; transition: background-image 0.5s ease-in-out; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,1); box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,1); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.05); }
        
        /* TOMBOL PILIHAN */
        .btn-pilihan { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-pilihan:active { transform: scale(0.92); border-color: #3b82f6; }
        
        /* DRAG & DROP ANTI MACET */
        .kartu-drag { touch-action: none; user-select: none; position: relative; z-index: 10; transition: box-shadow 0.2s, transform 0.3s ease-out; }
        .is-dragging { opacity: 0.95; z-index: 9999 !important; transform: scale(1.1) !important; transition: none !important; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .drop-active { border-color: #0ea5e9 !important; background-color: #f0f9ff !important; box-shadow: inset 0 0 0 4px #bae6fd; transform: scale(1.05); transition: all 0.2s; }
        
        /* Kunci benda yang sudah masuk kotak */
        .terkunci { pointer-events: none; opacity: 0.9; transform: scale(1) !important; box-shadow: none !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .anim-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes pulseSoft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .anim-pulse-soft { animation: pulseSoft 2s infinite ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .anim-shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div id="view-game" class="h-[100dvh] w-screen flex flex-col relative overflow-hidden bg-slate-50">
        
        <!-- Splash Screen -->
        <div id="layar-mulai" class="absolute inset-0 z-[100] bg-gradient-to-br from-sky-400 to-indigo-500 flex flex-col items-center justify-center p-6 text-center transition-all duration-500">
            <div class="bg-white/20 p-6 rounded-3xl backdrop-blur-sm mb-6 anim-pulse-soft shadow-xl border border-white/30">
                <i data-lucide="gamepad-2" class="w-16 h-16 text-white"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-white mb-2 tracking-tight">Belajar Cerdas</h1>
            <p class="text-sky-100 font-bold mb-10 text-sm md:text-base">Siap untuk petualangan seru?</p>
            <button onclick="Game.mulaiPilihLevel()" class="bg-white text-indigo-600 hover:bg-slate-50 font-black text-xl md:text-2xl py-4 px-12 rounded-full shadow-[0_6px_0_0_rgba(255,255,255,0.3)] active:translate-y-1 active:shadow-[0_0px_0_0_rgba(255,255,255,0)] transition-all w-full max-w-[250px]">
                MULAI
            </button>
        </div>

        <!-- Peta Level -->
        <div id="layar-pilih-level" class="hidden absolute inset-0 z-[90] bg-slate-50/95 backdrop-blur flex flex-col items-center justify-start overflow-y-auto">
            <div class="w-full bg-white px-6 pt-10 pb-4 shadow-sm sticky top-0 z-10 flex items-center justify-between">
                <h2 class="text-xl font-black text-slate-800">Pilih Level</h2>
                <button onclick="Game.tutupPilihLevel()" id="btn-tutup-level" class="hidden p-2 bg-slate-100 text-slate-600 rounded-full hover:bg-slate-200">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="w-full max-w-lg p-6">
                <div id="grid-level" class="grid grid-cols-4 sm:grid-cols-5 gap-3 sm:gap-4 content-start"></div>
            </div>
        </div>

        <!-- Top Navigation -->
        <header class="absolute top-3 left-3 right-3 z-20 flex justify-between items-center glass-nav rounded-full px-2 py-2">
            <div class="flex items-center gap-2">
                <button onclick="Game.bukaPilihLevel()" class="w-10 h-10 flex items-center justify-center bg-slate-100/50 text-slate-700 rounded-full active:scale-90 transition">
                    <i data-lucide="grid" class="w-5 h-5"></i>
                </button>
                <div class="flex gap-0.5 px-2" id="ui-nyawa"></div>
            </div>
            <div class="font-black text-lg text-slate-800 absolute left-1/2 -translate-x-1/2">
                LVL <span id="ui-level" class="text-sky-500">1</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-1 bg-amber-100/70 px-3 py-1.5 rounded-full text-amber-600 font-black text-xs md:text-sm">
                    <i data-lucide="star" class="w-3.5 h-3.5 fill-amber-500"></i><span id="ui-skor">0</span>
                </div>
                <button onclick="AudioMgr.toggleMute()" id="btn-mute" class="w-10 h-10 flex items-center justify-center bg-slate-100/50 text-slate-700 rounded-full active:scale-90 transition">
                    <i data-lucide="volume-2" id="ikon-suara" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Area Bermain -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden flex flex-col items-center justify-start px-4 pt-24 pb-6 w-full max-w-2xl mx-auto z-10 relative">
            <div class="glass-card rounded-[1.5rem] p-4 w-full flex items-center gap-4 mb-4 anim-fade flex-shrink-0">
                <button onclick="AudioMgr.putarUlangSoal()" id="btn-suara-soal" class="hidden flex-shrink-0 w-12 h-12 flex items-center justify-center bg-sky-100 text-sky-600 rounded-full active:scale-90 transition-transform shadow-sm">
                    <i data-lucide="volume-2" id="ikon-baca-soal" class="w-6 h-6"></i>
                </button>
                <h2 id="teks-pertanyaan" class="text-base md:text-xl font-bold text-slate-800 leading-snug flex-1">Memuat...</h2>
            </div>
            <div id="arena-bermain" class="w-full flex-1 flex flex-col items-center justify-center min-h-0"></div>
        </main>

        <!-- Pesan Akhir -->
        <div id="layar-pesan" class="hidden absolute inset-0 z-[80] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-6">
            <div class="bg-white rounded-[2rem] p-8 max-w-xs w-full text-center shadow-2xl anim-fade relative overflow-hidden">
                <div id="pesan-ikon" class="mx-auto flex justify-center mb-4"></div>
                <h1 id="pesan-judul" class="text-3xl font-black mb-1 text-slate-800">...</h1>
                <p id="pesan-sub" class="text-slate-500 font-bold mb-8 text-sm">...</p>
                <div id="wadah-tombol-pesan" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ==========================================
        // AUDIO MANAGER
        // ==========================================
        const AudioMgr = {
            bgm: new Audio(), sfxBenar: new Audio(), sfxSalah: new Audio(), soal: new Audio(), 
            isMuted: false, urlSoalSaatIni: null,
            volumeNormalBGM: 0.3, volumePelanBGM: 0.05, 
            
            defBenar: 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3',
            defSalah: 'https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3',
            
            getAmanPath(url) {
                if(!url) return null;
                if(url.startsWith('http') || url.startsWith('data:')) return url;
                return `public/${url}`;
            },

            initGlobal(cfg) {
                if(cfg && cfg.bgm_url) { 
                    this.bgm.src = this.getAmanPath(cfg.bgm_url); 
                    this.bgm.loop = true; 
                    this.bgm.volume = this.volumeNormalBGM; 
                }
                this.soal.onended = () => {
                    this.fadeVolume(this.bgm, this.volumeNormalBGM, 800);
                    const ikon = document.getElementById('ikon-baca-soal');
                    if(ikon) ikon.classList.remove('animate-pulse', 'text-sky-400');
                };
            },

            setAudioLevel(dataLevel) {
                if (!dataLevel) return;
                if(dataLevel.bgm_level) {
                    const lBgm = this.getAmanPath(dataLevel.bgm_level);
                    if(!this.bgm.src.endsWith(lBgm.replace('public/',''))) {
                        this.bgm.src = lBgm;
                        if(!this.isMuted) this.bgm.play().catch(()=>{});
                    }
                }

                this.sfxBenar.src = dataLevel.sfx_benar ? this.getAmanPath(dataLevel.sfx_benar) : this.defBenar;
                this.sfxSalah.src = dataLevel.sfx_salah ? this.getAmanPath(dataLevel.sfx_salah) : this.defSalah;
                this.urlSoalSaatIni = dataLevel.audio_soal ? this.getAmanPath(dataLevel.audio_soal) : null;
                
                const btnSoal = document.getElementById('btn-suara-soal');
                if (this.urlSoalSaatIni) btnSoal.classList.remove('hidden');
                else btnSoal.classList.add('hidden');
            },

            toggleMute() {
                this.isMuted = !this.isMuted;
                this.bgm.muted = this.isMuted; this.sfxBenar.muted = this.isMuted;
                this.sfxSalah.muted = this.isMuted; this.soal.muted = this.isMuted;
                const ikon = document.getElementById('ikon-suara');
                const btn = document.getElementById('btn-mute');
                if(this.isMuted) {
                    ikon.setAttribute('data-lucide', 'volume-x');
                    btn.classList.replace('bg-slate-100/50', 'bg-red-100');
                    btn.classList.replace('text-slate-700', 'text-red-500');
                    this.stopSoal(); 
                } else {
                    ikon.setAttribute('data-lucide', 'volume-2');
                    btn.classList.replace('bg-red-100', 'bg-slate-100/50');
                    btn.classList.replace('text-red-500', 'text-slate-700');
                    if (this.bgm.src) { this.bgm.volume = this.volumeNormalBGM; this.bgm.play().catch(()=>{}); }
                }
                lucide.createIcons();
            },
            playBGM() { if(!this.isMuted && this.bgm.src) { this.bgm.volume = this.volumeNormalBGM; this.bgm.play().catch(()=>{}); } },
            playBenar() { this.stopSoal(); if(!this.isMuted && this.sfxBenar.src) { this.sfxBenar.currentTime=0; this.sfxBenar.play().catch(()=>{}); } },
            playSalah() { this.stopSoal(); if(!this.isMuted && this.sfxSalah.src) { this.sfxSalah.currentTime=0; this.sfxSalah.play().catch(()=>{}); } },
            playSoal() {
                this.soal.pause();
                if(!this.urlSoalSaatIni || this.isMuted) return;
                this.soal.src = this.urlSoalSaatIni;
                this.soal.play().then(() => {
                    this.fadeVolume(this.bgm, this.volumePelanBGM, 400);
                    const ikon = document.getElementById('ikon-baca-soal');
                    if(ikon) ikon.classList.add('animate-pulse', 'text-sky-400');
                }).catch(()=>{});
            },
            putarUlangSoal() { this.playSoal(); },
            stopSoal() {
                this.soal.pause(); this.soal.currentTime = 0;
                this.fadeVolume(this.bgm, this.volumeNormalBGM, 300);
                const ikon = document.getElementById('ikon-baca-soal');
                if(ikon) ikon.classList.remove('animate-pulse', 'text-sky-400');
            },
            fadeVolume(audioEl, targetVolume, durationMs) {
                if(!audioEl || isNaN(audioEl.duration)) return;
                const steps = 10; const stepTime = durationMs / steps;
                const volumeStep = (targetVolume - audioEl.volume) / steps;
                let currentStep = 0;
                const fadeInterval = setInterval(() => {
                    currentStep++;
                    let newVol = audioEl.volume + volumeStep;
                    if(newVol > 1) newVol = 1; if(newVol < 0) newVol = 0;
                    audioEl.volume = newVol;
                    if(currentStep >= steps) { audioEl.volume = targetVolume; clearInterval(fadeInterval); }
                }, stepTime);
            }
        };

        // ==========================================
        // DRAG & DROP ENGINE (DIPERBAIKI)
        // ==========================================
        interact('.kartu-drag').draggable({
            inertia: true,
            modifiers: [
                interact.modifiers.restrictRect({
                    restriction: 'parent', // Biar ga keluar layar
                    endOnly: false
                })
            ],
            listeners: {
                start(e) { 
                    e.target.classList.add('is-dragging'); 
                    AudioMgr.stopSoal(); 
                },
                move(e) {
                    var x = (parseFloat(e.target.getAttribute('data-x')) || 0) + e.dx;
                    var y = (parseFloat(e.target.getAttribute('data-y')) || 0) + e.dy;
                    e.target.style.transform = `translate(${x}px, ${y}px)`;
                    e.target.setAttribute('data-x', x);
                    e.target.setAttribute('data-y', y);
                },
                end(e) {
                    e.target.classList.remove('is-dragging');
                    // SNAP BACK jika tidak nyantol ke dropzone
                    if(!e.target.classList.contains('terkunci')) {
                        e.target.style.transform = 'translate(0px, 0px)';
                        e.target.setAttribute('data-x', 0);
                        e.target.setAttribute('data-y', 0);
                    }
                }
            }
        });

        // ==========================================
        // ENGINE GAME 
        // ==========================================
        const Game = {
            db: { global: {}, levels: [] }, levelSekarang: 0, skor: 0, nyawa: 3, 
            levelTerbuka: parseInt(localStorage.getItem('maxUnlockedLevel')) || 0,
            urutanBenarSaatIni: 0, // Untuk mode Urutan

            async mulaiPilihLevel() {
                const btnMulai = document.getElementById('layar-mulai');
                btnMulai.style.opacity = '0';
                setTimeout(() => btnMulai.classList.add('hidden'), 400);
                
                try {
                    const jsonUrl = `public/data-soal.json?v=${Date.now()}`;
                    const res = await fetch(jsonUrl);
                    if (!res.ok) throw new Error("Gagal mengambil data");
                    const data = await res.json();
                    
                    this.db.global = data.global_settings || {};
                    this.db.levels = data.levels || [];
                    if(this.db.levels.length === 0) throw new Error("Level Kosong");
                    
                    AudioMgr.initGlobal(this.db.global);
                } catch(e) {
                    console.warn("DB tidak ditemukan. Silakan Publish dari Admin Panel.");
                    this.db.levels = [{ kategori: "kuis", pertanyaan: "Belum ada soal, buka Admin Panel!", item_target: { nama: "Mengerti", isTarget: true }, item_pengecoh: [] }];
                }

                AudioMgr.playBGM();
                this.levelTerbuka = Math.min(this.levelTerbuka, Math.max(0, this.db.levels.length - 1));
                this.bukaPilihLevel(true);
            },

            bukaPilihLevel(isBaruBuka = false) {
                const layar = document.getElementById('layar-pilih-level');
                const grid = document.getElementById('grid-level');
                const btnTutup = document.getElementById('btn-tutup-level');
                
                AudioMgr.stopSoal();
                grid.innerHTML = '';
                if(isBaruBuka) btnTutup.classList.add('hidden');
                else btnTutup.classList.remove('hidden');

                if (!Array.isArray(this.db.levels)) this.db.levels = [];

                this.db.levels.forEach((lvl, idx) => {
                    const isUnlocked = idx <= this.levelTerbuka;
                    const btn = document.createElement('button');
                    
                    if(isUnlocked) {
                        btn.className = "bg-white border-2 border-slate-200 text-slate-700 font-black text-xl py-5 rounded-[1.2rem] shadow-sm hover:border-sky-400 active:scale-95 transition-all flex flex-col items-center justify-center gap-1";
                        btn.innerHTML = `<span>${idx + 1}</span>${idx < this.levelTerbuka ? '<i data-lucide="star" class="w-3 h-3 fill-amber-400 text-amber-400"></i>' : '<div class="w-3 h-3"></div>'}`;
                        btn.onclick = () => { this.mainkanLevel(idx); };
                    } else {
                        btn.className = "bg-slate-100 border border-slate-200 text-slate-400 font-bold text-xl py-5 rounded-[1.2rem] flex flex-col items-center justify-center cursor-not-allowed gap-1";
                        btn.innerHTML = `<i data-lucide="lock" class="w-4 h-4 opacity-50"></i><span>${idx + 1}</span>`;
                    }
                    grid.appendChild(btn);
                });
                lucide.createIcons();
                layar.classList.remove('hidden');
            },

            tutupPilihLevel() { document.getElementById('layar-pilih-level').classList.add('hidden'); },

            mainkanLevel(idx) {
                this.tutupPilihLevel();
                this.levelSekarang = idx;
                this.nyawa = 3; 
                this.urutanBenarSaatIni = 0;
                this.renderUI();
                this.muatArena();
            },

            simpanProgres() {
                if (this.levelSekarang >= this.levelTerbuka) {
                    this.levelTerbuka = Math.min(this.levelSekarang + 1, this.db.levels.length - 1);
                    localStorage.setItem('maxUnlockedLevel', this.levelTerbuka);
                }
            },

            renderUI() {
                document.getElementById('ui-skor').innerText = this.skor;
                const wadahNyawa = document.getElementById('ui-nyawa');
                wadahNyawa.innerHTML = '';
                for(let i=0; i<3; i++) wadahNyawa.innerHTML += `<i data-lucide="heart" class="w-4 h-4 ${i < this.nyawa ? 'fill-rose-500 text-rose-500' : 'text-slate-300'}"></i>`;
                lucide.createIcons();
            },

            muatArena() {
                const arena = document.getElementById('arena-bermain'); 
                arena.innerHTML = ''; 
                
                const dataLevel = this.db.levels[this.levelSekarang];
                if (!dataLevel) return;

                document.getElementById('ui-level').innerText = this.levelSekarang + 1;
                document.getElementById('teks-pertanyaan').innerText = dataLevel.pertanyaan || "Soal";

                const bgLayar = dataLevel.bg_image || this.db.global.bg_image;
                document.getElementById('view-game').style.backgroundImage = bgLayar ? `url('${AudioMgr.getAmanPath(bgLayar)}')` : 'none';
                
                AudioMgr.setAudioLevel(dataLevel);
                if(dataLevel.audio_soal) { setTimeout(() => AudioMgr.playSoal(), 500); }

                if(dataLevel.kategori === 'drag') this.mesinDrag(dataLevel, arena);
                else if (dataLevel.kategori === 'urutan') this.mesinUrutan(dataLevel, arena);
                else this.mesinKuis(dataLevel, arena);
            },

            mesinKuis(data, arena) {
                const target = data.item_target || { nama: "Jawaban Benar", isTarget: true };
                const pengecoh = Array.isArray(data.item_pengecoh) ? data.item_pengecoh : [];
                let itemsAcak = [target, ...pengecoh].sort(() => Math.random() - 0.5);
                
                const gridClass = itemsAcak.length > 2 ? "grid-cols-2" : "grid-cols-1 sm:grid-cols-2";
                const grid = document.createElement('div');
                grid.className = `grid ${gridClass} gap-3 md:gap-4 w-full mt-auto pb-4 anim-fade`;
                
                itemsAcak.forEach(it => {
                    const btn = document.createElement('button');
                    btn.className = "btn-pilihan bg-white border-2 border-slate-100 text-slate-700 font-bold text-sm md:text-base p-4 rounded-3xl shadow-sm hover:border-sky-300 hover:bg-sky-50 flex flex-col items-center justify-center gap-2 min-h-[130px] w-full";
                    
                    let konten = '';
                    const urlPath = it.url_gambar ? AudioMgr.getAmanPath(it.url_gambar) : '';
                    if(urlPath) konten += `<img src="${urlPath}" class="h-20 object-contain rounded-lg" onerror="this.style.display='none'" draggable="false">`;
                    if(it.nama) konten += `<span class="leading-tight text-center w-full">${it.nama}</span>`;
                    
                    btn.innerHTML = konten || "Pilihan";
                    btn.onclick = () => { AudioMgr.stopSoal(); this.prosesKuis(it.isTarget, btn); };
                    grid.appendChild(btn);
                });
                arena.appendChild(grid);
            },

            mesinDrag(data, arena) {
                arena.innerHTML = `
                    <div id="zona-target-drag" class="w-32 h-32 md:w-48 md:h-48 border-4 border-dashed border-sky-300 bg-sky-50/50 rounded-3xl flex flex-col items-center justify-center mb-auto mt-4 transition-colors z-0">
                        <i data-lucide="inbox" class="w-10 h-10 text-sky-400 mb-1"></i>
                        <span class="font-bold text-sky-600 text-xs">Taruh Sini</span>
                    </div>
                    <div id="wadah-item" class="w-full flex justify-center flex-wrap gap-4 pb-6 mt-8 anim-slide-up z-10"></div>
                `;
                lucide.createIcons();
                
                const wadahItem = document.getElementById('wadah-item');
                const target = data.item_target || { nama: "Target", isTarget: true };
                const pengecoh = Array.isArray(data.item_pengecoh) ? data.item_pengecoh : [];
                let itemsAcak = [target, ...pengecoh].sort(() => Math.random() - 0.5);

                itemsAcak.forEach(it => {
                    const el = document.createElement('div');
                    el.setAttribute('data-tipe', 'drag-tunggal');
                    el.setAttribute('data-benar', it.isTarget ? 'ya' : 'tidak');
                    el.className = "kartu-drag w-24 h-24 bg-white rounded-2xl shadow-sm border-2 border-slate-200 cursor-grab flex flex-col items-center justify-center overflow-hidden relative";
                    
                    const urlPath = it.url_gambar ? AudioMgr.getAmanPath(it.url_gambar) : '';
                    el.innerHTML = `
                        <div class="absolute inset-0 flex items-center justify-center p-2 text-center text-xs font-bold text-slate-600 ${urlPath ? 'hidden' : ''}">${it.nama || '?'}</div>
                        <img src="${urlPath}" class="w-full h-full object-cover" onerror="this.previousElementSibling.classList.remove('hidden'); this.style.display='none'" draggable="false" />
                    `;
                    wadahItem.appendChild(el);
                });

                // Init Dropzone Tunggal
                interact('#zona-target-drag').dropzone({
                    accept: '[data-tipe="drag-tunggal"]', overlap: 0.5,
                    ondragenter(e) { e.target.classList.add('drop-active'); },
                    ondragleave(e) { e.target.classList.remove('drop-active'); },
                    ondrop: (e) => {
                        e.target.classList.remove('drop-active');
                        const isBenar = e.relatedTarget.getAttribute('data-benar') === 'ya';
                        
                        if(isBenar) {
                            e.relatedTarget.classList.add('terkunci'); // Mengunci benda ke dropzone
                            // Pindahkan benda ke dalam zona target
                            e.relatedTarget.style.transform = 'none';
                            e.target.innerHTML = ''; e.target.appendChild(e.relatedTarget);
                            e.relatedTarget.style.width = '100%'; e.relatedTarget.style.height = '100%';
                            e.relatedTarget.style.border = 'none';
                            
                            this.prosesKuis(true, e.target);
                        } else {
                            // Nyawa kurang
                            AudioMgr.playSalah(); this.nyawa--; this.renderUI();
                            e.target.classList.add('anim-shake');
                            setTimeout(() => e.target.classList.remove('anim-shake'), 500);
                            
                            // Snap back otomatis (sudah diatur di end interactjs)
                            if(this.nyawa <= 0) setTimeout(() => this.munculLayarAkhir('kalah'), 500);
                        }
                    }
                });
            },

            // FITUR BARU: MESIN URUTAN GAMBAR
            mesinUrutan(data, arena) {
                const arrUrutan = data.item_urutan || [];
                const jumlahItem = arrUrutan.length;
                this.urutanBenarSaatIni = 0; // Reset counter

                let htmlZona = `<div class="flex flex-wrap justify-center gap-2 mb-auto mt-4 w-full">`;
                for(let i=0; i<jumlahItem; i++) {
                    htmlZona += `<div id="drop-urutan-${i}" data-index="${i}" class="zona-urutan w-20 h-20 md:w-24 md:h-24 border-2 border-dashed border-sky-400 bg-sky-50/50 rounded-2xl flex items-center justify-center transition-colors relative"><span class="absolute -top-3 -left-3 bg-sky-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow">${i+1}</span></div>`;
                }
                htmlZona += `</div><div id="wadah-item-urutan" class="w-full flex justify-center flex-wrap gap-3 pb-6 mt-8 anim-slide-up z-10"></div>`;
                arena.innerHTML = htmlZona;

                const wadahItem = document.getElementById('wadah-item-urutan');
                let itemsAcak = [...arrUrutan].sort(() => Math.random() - 0.5);

                itemsAcak.forEach(it => {
                    const el = document.createElement('div');
                    el.setAttribute('data-tipe', 'drag-urutan');
                    el.setAttribute('data-index-asli', it.indexAsli);
                    el.className = "kartu-drag w-20 h-20 md:w-24 md:h-24 bg-white rounded-2xl shadow-sm border border-slate-200 cursor-grab flex items-center justify-center overflow-hidden relative";
                    
                    const urlPath = it.url_gambar ? AudioMgr.getAmanPath(it.url_gambar) : '';
                    el.innerHTML = `
                        <div class="absolute inset-0 flex items-center justify-center p-1 text-center text-[10px] font-bold text-slate-600 ${urlPath ? 'hidden' : ''}">${it.nama || '?'}</div>
                        <img src="${urlPath}" class="w-full h-full object-cover" onerror="this.previousElementSibling.classList.remove('hidden'); this.style.display='none'" draggable="false" />
                    `;
                    wadahItem.appendChild(el);
                });

                // Init Dropzone Multi
                interact('.zona-urutan').dropzone({
                    accept: '[data-tipe="drag-urutan"]', overlap: 0.5,
                    ondragenter(e) { e.target.classList.add('drop-active'); },
                    ondragleave(e) { e.target.classList.remove('drop-active'); },
                    ondrop: (e) => {
                        e.target.classList.remove('drop-active');
                        const indexDrop = parseInt(e.target.getAttribute('data-index'));
                        const indexBenda = parseInt(e.relatedTarget.getAttribute('data-index-asli'));
                        
                        // Cek apakah ditaruh di urutan yang tepat
                        if(indexDrop === indexBenda) {
                            e.relatedTarget.classList.add('terkunci');
                            e.relatedTarget.style.transform = 'none';
                            e.target.appendChild(e.relatedTarget);
                            e.relatedTarget.style.width = '100%'; e.relatedTarget.style.height = '100%';
                            
                            AudioMgr.sfxBenar.currentTime = 0; AudioMgr.sfxBenar.play().catch(()=>{});
                            Game.urutanBenarSaatIni++;
                            
                            // Jika semua terurut dengan benar, menang!
                            if(Game.urutanBenarSaatIni >= jumlahItem) {
                                Game.skor += 100; Game.simpanProgres(); Game.renderUI();
                                setTimeout(() => Game.munculLayarAkhir('benar'), 800);
                            }
                        } else {
                            AudioMgr.playSalah(); Game.nyawa--; Game.renderUI();
                            e.target.classList.add('bg-red-100');
                            setTimeout(() => e.target.classList.remove('bg-red-100'), 500);
                            if(Game.nyawa <= 0) setTimeout(() => Game.munculLayarAkhir('kalah'), 500);
                        }
                    }
                });
            },

            prosesKuis(isBenar, elemenAnimasi) {
                document.querySelectorAll('button.btn-pilihan').forEach(e => e.disabled = true);
                if(isBenar) {
                    AudioMgr.playBenar(); this.skor += 100; this.simpanProgres(); this.renderUI();
                    elemenAnimasi.classList.add('bg-emerald-50', 'border-emerald-400');
                    setTimeout(() => this.munculLayarAkhir('benar'), 1000);
                } else {
                    AudioMgr.playSalah(); this.nyawa--; this.renderUI();
                    elemenAnimasi.classList.add('bg-rose-50', 'border-rose-400', 'anim-shake');
                    setTimeout(() => this.munculLayarAkhir(this.nyawa <= 0 ? 'kalah' : 'salah'), 1000);
                }
            },

            munculLayarAkhir(status) {
                const layar = document.getElementById('layar-pesan'); 
                const ikon = document.getElementById('pesan-ikon');
                const judul = document.getElementById('pesan-judul'); 
                const sub = document.getElementById('pesan-sub');
                const wadahTombol = document.getElementById('wadah-tombol-pesan');
                
                layar.classList.remove('hidden');
                wadahTombol.innerHTML = '';

                if(status === 'benar') {
                    ikon.innerHTML = `<div class="bg-amber-100 p-4 rounded-full mb-1 inline-block"><i data-lucide="star" class="w-16 h-16 text-amber-500 fill-amber-400"></i></div>`;
                    judul.innerText = "Sempurna!"; judul.className = "text-3xl font-black mb-1 text-slate-800";
                    
                    if(this.levelSekarang >= this.db.levels.length - 1) {
                        sub.innerText = `Skor Total: ${this.skor}\nSemua level selesai!`;
                        wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.bukaPilihLevel();" class="w-full bg-sky-500 text-white font-bold text-lg py-4 rounded-2xl shadow-sm transition-all">Peta Level</button>`;
                    } else {
                        sub.innerText = `Mari lanjut!`;
                        wadahTombol.innerHTML = `
                            <button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.mainkanLevel(Game.levelSekarang + 1);" class="w-full bg-sky-500 text-white font-bold text-lg py-4 rounded-2xl shadow-sm transition-all mb-2">Lanjut Level</button>
                            <button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.bukaPilihLevel();" class="w-full bg-slate-100 text-slate-600 font-bold text-sm py-3 rounded-2xl hover:bg-slate-200">Peta Level</button>
                        `;
                    }
                } else if(status === 'salah') {
                    ikon.innerHTML = `<div class="bg-orange-100 p-4 rounded-full mb-1 inline-block"><i data-lucide="refresh-ccw" class="w-12 h-12 text-orange-500"></i></div>`;
                    judul.innerText = "Aduh Salah"; judul.className = "text-3xl font-black mb-1 text-slate-800";
                    sub.innerText = "Ayo coba lagi, kamu pasti bisa!";
                    wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.muatArena();" class="w-full bg-sky-500 text-white font-bold text-lg py-4 rounded-2xl shadow-sm transition-all">Coba Lagi</button>`;
                } else {
                    ikon.innerHTML = `<div class="bg-rose-100 p-4 rounded-full mb-1 inline-block"><i data-lucide="heart-crack" class="w-16 h-16 text-rose-500"></i></div>`;
                    judul.innerText = "Game Over"; judul.className = "text-3xl font-black mb-1 text-slate-800";
                    sub.innerText = `Skor Terakhir: ${this.skor}`;
                    wadahTombol.innerHTML = `<button onclick="document.getElementById('layar-pesan').classList.add('hidden'); Game.bukaPilihLevel();" class="w-full bg-slate-800 text-white font-bold text-lg py-4 rounded-2xl shadow-sm transition-all">Peta Level</button>`;
                }
                lucide.createIcons();
            }
        };
    </script>
</body>
