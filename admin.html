<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS Admin Pintar</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f8fafc; }
        .app-container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 25px rgba(0,0,0,0.05); position: relative; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .toast-enter { animation: slideInDown 0.3s forwards; }
        .toast-leave { animation: slideOutUp 0.3s forwards; }
        @keyframes slideInDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        @keyframes slideOutUp { from { transform: translate(-50%, 0); opacity: 1; } to { transform: translate(-50%, -100%); opacity: 0; } }
    </style>
</head>
<body>

    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Modal Konfirmasi Custom -->
    <div id="modal-confirm" class="hidden fixed inset-0 z-[9999] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] p-6 max-w-sm w-full text-center shadow-2xl relative overflow-hidden">
            <div class="mx-auto flex justify-center mb-3"><div class="bg-rose-100 p-3 rounded-full"><i data-lucide="alert-triangle" class="w-8 h-8 text-rose-500"></i></div></div>
            <h2 class="text-xl font-black mb-2 text-slate-800">Konfirmasi</h2>
            <p id="confirm-text" class="text-slate-500 font-bold mb-6 text-sm">Apakah kamu yakin?</p>
            <div class="flex gap-2">
                <button id="btn-confirm-no" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200">Batal</button>
                <button id="btn-confirm-yes" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl shadow-sm hover:bg-rose-600">Ya</button>
            </div>
        </div>
    </div>

    <div class="app-container flex flex-col pb-28">
        <header class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
            <h1 class="text-xl font-black flex items-center gap-2"><i data-lucide="server"></i> Panel Admin Game</h1>
            <div class="flex gap-2">
                <button onclick="window.location.href='index.html'" class="bg-indigo-800 p-2 rounded-xl hover:bg-indigo-900 transition" title="Main Game"><i data-lucide="play" class="w-5 h-5"></i></button>
                <button onclick="bukaModal('modal-config')" class="bg-amber-400 text-amber-950 p-2 rounded-xl hover:bg-amber-300 font-bold flex items-center gap-1 transition"><i data-lucide="settings" class="w-5 h-5"></i> Repo</button>
            </div>
        </header>

        <main class="flex-1 p-5 space-y-4">
            <div id="admin-status" class="bg-yellow-50 border-2 border-yellow-200 text-yellow-800 p-4 rounded-2xl text-sm font-bold flex items-center justify-between shadow-sm transition-colors duration-300">
                <div class="flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-6 h-6 flex-shrink-0" id="icon-status"></i> 
                    <span id="text-status">Klik tombol kuning "Repo".</span>
                </div>
                <button onclick="tarikDataGitHub(true)" class="bg-white/50 p-2 rounded-lg hover:bg-white transition" title="Tarik Paksa Data Github"><i data-lucide="refresh-cw" id="icon-sync" class="w-4 h-4"></i></button>
            </div>

            <!-- TOMBOL AKSI UTAMA -->
            <div class="grid grid-cols-2 gap-2">
                <button onclick="document.getElementById('file-import').click()" class="bg-white border-2 border-slate-200 hover:border-indigo-400 text-slate-700 p-3 rounded-xl font-bold flex items-center justify-center gap-2 text-sm transition shadow-sm">
                    <i data-lucide="download" class="w-4 h-4"></i> Import JSON
                </button>
                <input type="file" id="file-import" accept=".json" class="hidden" onchange="importJSON(event)">
                
                <button onclick="exportJSON()" class="bg-white border-2 border-slate-200 hover:border-indigo-400 text-slate-700 p-3 rounded-xl font-bold flex items-center justify-center gap-2 text-sm transition shadow-sm">
                    <i data-lucide="upload" class="w-4 h-4"></i> Export Backup
                </button>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="ProceduralGenerator.buat5Soal()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black p-3 rounded-xl flex justify-center items-center gap-2 transition-all shadow-sm">
                    <i data-lucide="wand-2" class="w-4 h-4"></i> +5 Soal Acak
                </button>
                <button onclick="hapusSemuaLevel()" class="bg-rose-500 hover:bg-rose-600 text-white font-black p-3 rounded-xl flex justify-center items-center gap-2 transition-all shadow-sm">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Hapus Semua
                </button>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 mt-4">
                <div class="flex justify-between items-center mb-4 pb-3 border-b-2 border-slate-100">
                    <h2 class="font-black text-xl text-slate-800">Daftar Level (<span id="total-level">0</span>)</h2>
                    <button onclick="bukaFormTambah()" class="bg-sky-100 text-sky-700 font-black px-4 py-2 rounded-xl text-sm flex gap-1 items-center hover:bg-sky-200 transition"><i data-lucide="plus" class="w-5 h-5"></i> BUAT BARU</button>
                </div>
                <div id="daftar-soal-admin" class="space-y-3"></div>
            </div>
        </main>

        <div class="fixed bottom-0 w-full max-w-[600px] p-5 bg-white/90 backdrop-blur border-t-2 z-40 flex gap-2">
            <button onclick="publishKeGitHub()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black text-xl py-4 rounded-2xl shadow-[0_8px_0_0_#059669] active:translate-y-2 active:shadow-none flex justify-center items-center gap-2 transition-all">
                <i data-lucide="upload-cloud"></i> SIMPAN & PUBLISH
            </button>
        </div>

        <div id="modal-loading" class="hidden fixed inset-0 z-[100] bg-indigo-900/95 backdrop-blur flex flex-col justify-center items-center p-6 text-center transition-all">
            <i data-lucide="loader" class="w-16 h-16 text-white animate-spin mb-4"></i>
            <div class="w-full max-w-xs bg-indigo-800 rounded-full h-2 mb-2 overflow-hidden">
                <div id="publish-bar" class="bg-sky-400 h-full w-0 transition-all duration-300"></div>
            </div>
            <p id="loading-teks" class="text-indigo-200 font-bold text-sm">Memproses...</p>
        </div>

        <!-- Modal Config -->
        <div id="modal-config" class="hidden fixed inset-0 z-[60] bg-slate-900/70 backdrop-blur-sm flex justify-center items-center p-4">
            <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl relative">
                <h2 class="font-black text-xl mb-4 flex items-center gap-2 text-indigo-800"><i data-lucide="github"></i> Setup GitHub</h2>
                <input type="password" id="gh-token" placeholder="Token (ghp_xxxx...)" class="w-full p-3 border-2 border-slate-200 rounded-xl mb-3 bg-slate-50 font-mono text-sm focus:border-indigo-400 outline-none">
                <input type="text" id="gh-repo" placeholder="username/repo" class="w-full p-3 border-2 border-slate-200 rounded-xl mb-6 bg-slate-50 font-mono text-sm focus:border-indigo-400 outline-none">
                
                <div class="bg-indigo-50 p-4 rounded-2xl mb-6 border border-indigo-100">
                    <h3 class="font-black text-sm text-indigo-800 mb-2">BGM Global (Musik Latar)</h3>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="path-bgm-global" class="w-full text-xs p-2 border border-indigo-200 rounded bg-white text-indigo-700 font-bold" placeholder="Pilih dari Galeri ->" readonly>
                        <button onclick="Galeri.bukaUtama('path-bgm-global', 'audio')" class="bg-indigo-200 text-indigo-800 p-2 rounded hover:bg-indigo-300"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                    </div>
                    <input type="file" id="f-bgm" accept="audio/*" class="w-full text-xs bg-white p-2 rounded-lg border border-indigo-200">
                </div>

                <button onclick="simpanConfigLokal()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-lg shadow-md hover:bg-indigo-700 active:scale-95 transition">Hubungkan</button>
                <button onclick="tutupModal('modal-config')" class="w-full text-slate-400 font-bold py-3 mt-2 hover:text-slate-600">Batal</button>
            </div>
        </div>

        <!-- MODAL GALERI ASET -->
        <div id="modal-galeri" class="hidden fixed inset-0 z-[80] bg-slate-100 flex flex-col max-w-[600px] mx-auto overflow-hidden">
            <header class="bg-indigo-800 p-4 flex justify-between items-center shadow-md">
                <h2 class="font-black text-lg text-white flex items-center gap-2"><i data-lucide="folder-open"></i> Galeri Aset Tersimpan</h2>
                <button onclick="Galeri.tutup()" class="bg-indigo-900 p-2 rounded-full text-white hover:bg-indigo-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </header>
            <div id="galeri-loading" class="p-8 text-center hidden">
                <i data-lucide="loader" class="w-8 h-8 text-indigo-500 animate-spin mx-auto mb-2"></i>
                <p class="text-sm font-bold text-slate-500">Membaca file dari GitHub...</p>
            </div>
            <div id="galeri-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-3 gap-3 content-start"></div>
        </div>

        <!-- MODAL FORM LEVEL (LENGKAP DENGAN FOLDER GALERI DI SETIAP INPUT) -->
        <div id="modal-soal" class="hidden fixed inset-0 z-[60] bg-slate-100 flex flex-col max-w-[600px] mx-auto overflow-hidden">
            <header class="bg-white p-5 flex justify-between items-center shadow-sm border-b">
                <h2 id="judul-modal-form" class="font-black text-xl text-slate-800">Edit Level</h2>
                <button onclick="tutupModal('modal-soal')" class="bg-slate-100 p-2 rounded-full text-slate-500 hover:bg-slate-200"><i data-lucide="x"></i></button>
            </header>
            
            <div class="flex-1 p-5 space-y-6 overflow-y-auto">
                <input type="hidden" id="edit-index" value="-1">

                <!-- SETTING DASAR -->
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                    <label class="font-black text-sm block mb-2 text-indigo-800">Kategori Game</label>
                    <select id="in-kategori" onchange="UbahTampilanForm()" class="w-full p-3 border border-indigo-200 rounded-xl bg-indigo-50 font-bold text-indigo-700 outline-none mb-4">
                        <option value="kuis">📝 Kuis (Pilihan Berganda)</option>
                        <option value="drag">🕹️ Drag & Drop (Tarik ke 1 Kotak)</option>
                        <option value="siluet">👤 Tebak Bayangan (Tarik ke Siluet)</option>
                        <option value="urutan">🔄 Urutan Gambar (Maks 6)</option>
                        <option value="memory">🃏 Kartu Memori (Cocokkan Gambar)</option>
                        <option value="tebak_kata">🔤 Tebak Kata (Susun Huruf)</option>
                        <option value="bubble">🫧 Bubble Shoot (Gelembung Air Terjun)</option>
                        <option value="melayang">🦋 Gambar Melayang (Pencet Sesuai Urutan)</option>
                        <option value="pukul">🔨 Pukul Tikus (Whack-a-Mole)</option>
                    </select>

                    <label class="font-black text-sm block mb-2 text-slate-800">Teks Instruksi / Pertanyaan</label>
                    <textarea id="in-tanya" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:border-indigo-400" rows="2" placeholder="Contoh: Manakah yang buah apel?"></textarea>
                
                    <label class="font-black text-sm block mt-4 mb-2 text-slate-800 flex items-center gap-1"><i data-lucide="image" class="w-4 h-4 text-sky-500"></i> Gambar Petunjuk / Media Soal</label>
                    <div class="flex gap-2 mb-1">
                        <input type="text" id="path-media-soal" class="w-full text-xs p-2 border border-slate-200 rounded bg-slate-50" placeholder="Pilih Galeri ->" readonly>
                        <button onclick="Galeri.bukaUtama('path-media-soal', 'image')" class="bg-indigo-100 text-indigo-700 p-2 rounded hover:bg-indigo-200"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                    </div>
                    <input type="file" id="f-media-soal" accept="image/*" class="w-full text-[10px] bg-white p-1.5 rounded-lg border border-slate-200">
                </div>

                <!-- OPSI KECEPATAN FISIKA -->
                <div id="wadah-speed" class="hidden bg-orange-50 p-5 rounded-3xl border border-orange-200 shadow-sm">
                    <label class="font-black text-sm block mb-2 text-orange-800">Kecepatan Gerakan Benda</label>
                    <select id="in-speed" class="w-full p-3 border border-orange-300 rounded-xl bg-white font-bold outline-none">
                        <option value="lambat">🐢 Lambat</option>
                        <option value="normal" selected>🚶 Normal</option>
                        <option value="cepat">🚀 Cepat</option>
                    </select>
                </div>

                <!-- MEDIA SPESIFIK LEVEL -->
                <div class="bg-sky-50 p-5 rounded-3xl shadow-sm border border-sky-200">
                    <h3 class="font-black text-sky-800 mb-3 flex items-center gap-2"><i data-lucide="music"></i> Latar & Audio Khusus Level</h3>
                    <div class="space-y-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold text-sky-700">Audio Soal (Dibacakan)</label>
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-lvl-soal" class="w-full text-[10px] p-2 border border-sky-300 rounded bg-white font-mono text-sky-700" placeholder="Pilih Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-lvl-soal', 'audio')" class="bg-sky-200 text-sky-800 p-2 rounded hover:bg-sky-300"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                            </div>
                            <input type="file" id="f-lvl-soal" accept="audio/*" class="w-full text-[10px] bg-white p-1.5 rounded-lg border border-sky-300">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold text-sky-700">Gambar Latar Belakang (BG)</label>
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-lvl-bg" class="w-full text-[10px] p-2 border border-sky-300 rounded bg-white font-mono text-sky-700" placeholder="Pilih Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-lvl-bg', 'image')" class="bg-sky-200 text-sky-800 p-2 rounded hover:bg-sky-300"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                            </div>
                            <input type="file" id="f-lvl-bg" accept="image/*" class="w-full text-[10px] bg-white p-1.5 rounded-lg border border-sky-300">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold text-sky-700">Musik BGM Level</label>
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-lvl-bgm" class="w-full text-[10px] p-2 border border-sky-300 rounded bg-white font-mono text-sky-700" placeholder="Pilih Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-lvl-bgm', 'audio')" class="bg-sky-200 text-sky-800 p-2 rounded hover:bg-sky-300"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                            </div>
                            <input type="file" id="f-lvl-bgm" accept="audio/*" class="w-full text-[10px] bg-white p-1.5 rounded-lg border border-sky-300">
                        </div>
                    </div>
                </div>

                <!-- WADAH TARGET & PENGECOH -->
                <div id="wadah-kuis-drag">
                    <div class="bg-emerald-50 p-5 rounded-3xl border border-emerald-300 shadow-sm mb-4">
                        <label class="font-black text-lg block mb-3 text-emerald-800 flex items-center gap-2"><i data-lucide="check-circle-2"></i> GAMBAR UTAMA / TARGET</label>
                        <input type="text" id="in-benar-nama" placeholder="Teks Jawaban Benar" class="w-full p-3 border border-emerald-300 rounded-xl bg-white mb-2 font-bold outline-none uppercase">
                        <div class="flex gap-2 mb-1 mt-2">
                            <input type="text" id="path-benar-img" class="w-full text-xs p-2 border border-emerald-300 rounded bg-white font-mono text-emerald-700" placeholder="Pilih Galeri ->" readonly>
                            <button onclick="Galeri.bukaUtama('path-benar-img', 'image')" class="bg-emerald-200 text-emerald-800 p-2 rounded hover:bg-emerald-300"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                        </div>
                        <input type="file" id="f-benar-img" accept="image/*" class="w-full text-sm bg-white p-2 rounded-xl border border-emerald-300">
                    </div>

                    <div class="bg-rose-50 p-5 rounded-3xl border border-rose-300 shadow-sm mb-6">
                        <label class="font-black text-lg block mb-3 text-rose-800 flex items-center gap-2"><i data-lucide="x-circle"></i> PENGECOH / HURUF EKSTRA</label>
                        
                        <div class="mb-4 bg-white/50 p-3 rounded-xl border border-rose-200">
                            <input type="text" id="in-p1-nama" placeholder="Teks Pengecoh 1" class="w-full p-2 border border-rose-200 rounded mb-1 text-sm font-bold uppercase">
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-p1-img" class="w-full text-[10px] p-2 border border-rose-200 rounded bg-white" placeholder="Pilih Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-p1-img', 'image')" class="bg-rose-200 text-rose-800 p-2 rounded hover:bg-rose-300"><i data-lucide="folder-search" class="w-3 h-3"></i></button>
                            </div>
                            <input type="file" id="f-p1-img" accept="image/*" class="w-full text-xs bg-white p-1 rounded">
                        </div>

                        <div class="mb-4 bg-white/50 p-3 rounded-xl border border-rose-200">
                            <input type="text" id="in-p2-nama" placeholder="Teks Pengecoh 2 (Ops)" class="w-full p-2 border border-rose-200 rounded mb-1 text-sm font-bold uppercase">
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-p2-img" class="w-full text-[10px] p-2 border border-rose-200 rounded bg-white" placeholder="Pilih Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-p2-img', 'image')" class="bg-rose-200 text-rose-800 p-2 rounded hover:bg-rose-300"><i data-lucide="folder-search" class="w-3 h-3"></i></button>
                            </div>
                            <input type="file" id="f-p2-img" accept="image/*" class="w-full text-xs bg-white p-1 rounded">
                        </div>

                        <div class="mb-2 bg-white/50 p-3 rounded-xl border border-rose-200">
                            <input type="text" id="in-p3-nama" placeholder="Teks Pengecoh 3 (Ops)" class="w-full p-2 border border-rose-200 rounded mb-1 text-sm font-bold uppercase">
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-p3-img" class="w-full text-[10px] p-2 border border-rose-200 rounded bg-white" placeholder="Pilih Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-p3-img', 'image')" class="bg-rose-200 text-rose-800 p-2 rounded hover:bg-rose-300"><i data-lucide="folder-search" class="w-3 h-3"></i></button>
                            </div>
                            <input type="file" id="f-p3-img" accept="image/*" class="w-full text-xs bg-white p-1 rounded">
                        </div>
                    </div>
                </div>

                <!-- WADAH URUTAN (Juga dipakai Melayang) -->
                <div id="wadah-urutan" class="hidden">
                    <div class="bg-indigo-50 p-5 rounded-3xl border border-indigo-300 shadow-sm mb-6">
                        <label class="font-black text-lg block mb-3 text-indigo-800 flex items-center gap-2"><i data-lucide="list-ordered"></i> ITEM URUTAN GAMBAR</label>
                        <div class="space-y-3" id="wadah-slot-urutan">
                            <!-- Di-generate lewat JS agar support tombol galeri -->
                        </div>
                    </div>
                </div>

            </div>

            <div class="bg-white p-5 border-t z-10 sticky bottom-0">
                <button onclick="simpanLevelKeDaftar()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xl py-4 rounded-2xl shadow-[0_6px_0_0_#4f46e5] active:translate-y-2 active:shadow-none transition-all flex justify-center items-center gap-2">
                    <i data-lucide="save"></i> SIMPAN LEVEL INI
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let dbLokal = { global_settings: {}, levels: [] };
        let antreanFile = []; let fileYangHarusDihapus = []; 

        function uiToast(msg, type='success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-enter px-6 py-3 rounded-full font-bold text-sm shadow-xl flex items-center gap-2 ${type==='success' ? 'bg-emerald-500 text-white' : (type==='error' ? 'bg-rose-500 text-white' : 'bg-sky-500 text-white')}`;
            toast.innerHTML = `<i data-lucide="${type==='success' ? 'check-circle' : (type==='error' ? 'alert-circle' : 'info')}" class="w-5 h-5"></i> ${msg}`;
            container.appendChild(toast); lucide.createIcons();
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-leave'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function uiConfirm(msg) {
            return new Promise((resolve) => {
                const modal = document.getElementById('modal-confirm');
                document.getElementById('confirm-text').innerText = msg;
                modal.classList.remove('hidden');
                document.getElementById('btn-confirm-yes').onclick = () => { modal.classList.add('hidden'); resolve(true); };
                document.getElementById('btn-confirm-no').onclick = () => { modal.classList.add('hidden'); resolve(false); };
            });
        }

        function bukaModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function tutupModal(id) { document.getElementById(id).classList.add('hidden'); }

        // RENDER 6 KOTAK URUTAN LENGKAP DENGAN TOMBOL GALERI
        function renderSlotUrutan() {
            const wadah = document.getElementById('wadah-slot-urutan'); let html = '';
            for(let i=1; i<=6; i++) {
                html += `
                <div class="bg-white p-3 rounded-xl border border-indigo-200 flex gap-2 items-center">
                    <div class="font-black text-indigo-400 text-xl px-2 w-6">${i}</div>
                    <div class="flex-1">
                        <input type="text" id="in-u${i}-nama" placeholder="Teks Urutan ${i}" class="w-full p-2 border border-indigo-100 rounded mb-1 text-sm font-bold">
                        <div class="flex gap-2 mb-1">
                            <input type="text" id="path-u${i}-img" class="w-full text-[10px] p-2 border border-indigo-100 rounded bg-slate-50" placeholder="Pilih Galeri ->" readonly>

            const token = localStorage.getItem('ghToken'); const repo = localStorage.getItem('ghRepo');
            const statusEl = document.getElementById('admin-status'); const icon = document.getElementById('icon-status'); const text = document.getElementById('text-status'); const btnSync = document.getElementById('icon-sync');
            icon.setAttribute('data-lucide', 'refresh-cw'); icon.classList.add('animate-spin', 'text-indigo-500'); if(btnSync) btnSync.classList.add('animate-spin');
            text.innerText = "Menarik data 0%..."; text.className = "text-indigo-800";
            statusEl.className = "bg-indigo-50 border-2 border-indigo-200 p-4 rounded-2xl text-sm font-bold flex items-center justify-between shadow-sm transition-colors";
            lucide.createIcons();

            let counter = 0; let intv = setInterval(() => { counter+=10; if(counter>90) counter=90; text.innerText = `Menarik data ${counter}%...`; }, 100);

            try {
                const reqOpt = forceRefresh ? { headers: { 'Authorization': `token ${token}` }, cache: 'no-store' } : { headers: { 'Authorization': `token ${token}` } };
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/public/data-soal.json?v=${Date.now()}`, reqOpt);

                    if(forceRefresh) uiToast("Berhasil menarik data!");

                    icon.setAttribute('data-lucide', 'info'); icon.classList.remove('animate-spin', 'text-indigo-500'); icon.classList.add('text-sky-500');

                text.innerText = "Error: " + e.message; text.className = "text-rose-800";
                statusEl.className = "bg-rose-50 border-2 border-rose-200 p-4 rounded-2xl text-sm font-bold flex items-center justify-between shadow-sm transition-colors";
                if(forceRefresh) uiToast("Gagal menarik data", "error");
            }
            if(btnSync) btnSync.classList.remove('animate-spin'); lucide.createIcons(); renderDaftarLevel();
        }

        function daftarAsetLevelIni(dataLevel) {
            let list = [];
            if(dataLevel.bg_image) list.push(`public/${dataLevel.bg_image}`);
            if(dataLevel.media_soal) list.push(`public/${dataLevel.media_soal}`);
            if(dataLevel.audio_soal) list.push(`public/${dataLevel.audio_soal}`);
            if(dataLevel.bgm_level) list.push(`public/${dataLevel.bgm_level}`);
            
            if(dataLevel.kategori === 'urutan' || dataLevel.kategori === 'melayang') {
                if(dataLevel.item_urutan) dataLevel.item_urutan.forEach(u => { if(u.url_gambar) list.push(`public/${u.url_gambar}`); });
            } else {
                if(dataLevel.item_target && dataLevel.item_target.url_gambar) list.push(`public/${dataLevel.item_target.url_gambar}`);
                if(dataLevel.item_pengecoh) dataLevel.item_pengecoh.forEach(pgc => { if(pgc.url_gambar) list.push(`public/${pgc.url_gambar}`); });
            }
            return list;
        }

        async function githubPutRequest(token, repo, path, base64Content) {
            const url = `https://api.github.com/repos/${repo}/contents/${path}`; let sha = null;
            try { const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } }); if(getRes.ok) sha = (await getRes.json()).sha; } catch(e) {} 
            const bodyData = { message: `CMS Update: ${path}`, content: base64Content }; if (sha) bodyData.sha = sha;
            const putRes = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData) });
            if(!putRes.ok) throw new Error(`Upload Gagal: ${path}`);
        }

        async function githubDeleteRequest(token, repo, path) {
            const url = `https://api.github.com/repos/${repo}/contents/${path}`;
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                if(getRes.ok) {
                    const sha = (await getRes.json()).sha;
                    await fetch(url, { method: 'DELETE', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `CMS Auto Delete: ${path}`, sha: sha }) });
                }
            } catch(e) {}
        }

            if(!token || !repo) return uiToast("Hubungkan Token GitHub!", "error");
            const modLoad = document.getElementById('modal-loading'); const tLoad = document.getElementById('loading-teks'); const pubBar = document.getElementById('publish-bar');
            modLoad.classList.remove('hidden'); pubBar.style.width = '10%';

            try {
                let currentProg = 10; const totalFiles = antreanFile.length + fileYangHarusDihapus.length + 1; const step = 90 / totalFiles;

                for(let i=0; i<fileYangHarusDihapus.length; i++) {
                    tLoad.innerText = `Menghapus file sampah ${i+1}/${fileYangHarusDihapus.length}...`;
                    await githubDeleteRequest(token, repo, fileYangHarusDihapus[i]);
                    currentProg += step; pubBar.style.width = `${currentProg}%`;
                }

                for(let i=0; i<antreanFile.length; i++) {
                    tLoad.innerText = `Upload media ${i+1}/${antreanFile.length}...`;
                    await githubPutRequest(token, repo, antreanFile[i].path, await ubahFileKeBase64(antreanFile[i].file));
                    currentProg += step; pubBar.style.width = `${currentProg}%`;
                }
                
                tLoad.innerText = `Menyinkronkan Database...`; pubBar.style.width = `95%`;
                const jsonStr = JSON.stringify(dbLokal, null, 2); const jsonB64 = window.btoa(unescape(encodeURIComponent(jsonStr)));
                await githubPutRequest(token, repo, 'public/data-soal.json', jsonB64);
                
                pubBar.style.width = `100%`; tLoad.innerText = `SELESAI!`;
                antreanFile = []; fileYangHarusDihapus = []; 
                
                setTimeout(() => { modLoad.classList.add('hidden'); uiToast("Semua data berhasil disimpan ke Server!"); }, 1000);
            } catch(e) { uiToast("ERROR: " + e.message, "error"); modLoad.classList.add('hidden'); }
        }
    </script>
</body>
</html>
