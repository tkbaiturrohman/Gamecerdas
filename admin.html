<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS Admin Pintar</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f8fafc; }
        .app-container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 25px rgba(0,0,0,0.05); position: relative; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container flex flex-col pb-28">
        <header class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
            <h1 class="text-xl font-black flex items-center gap-2"><i data-lucide="server"></i> Admin Data Game</h1>
            <div class="flex gap-2">
                <button onclick="window.location.href='index.html'" class="bg-indigo-800 p-2 rounded-xl hover:bg-indigo-900 transition" title="Main Game"><i data-lucide="play" class="w-5 h-5"></i></button>
                <button onclick="bukaModal('modal-config')" class="bg-amber-400 text-amber-950 p-2 rounded-xl hover:bg-amber-300 font-bold flex items-center gap-1 transition"><i data-lucide="settings" class="w-5 h-5"></i> Repo</button>
            </div>
        </header>

        <main class="flex-1 p-5 space-y-6">
            <div id="admin-status" class="bg-yellow-50 border-2 border-yellow-200 text-yellow-800 p-4 rounded-2xl text-sm font-bold flex items-center gap-3 shadow-sm">
                <i data-lucide="alert-circle" class="w-6 h-6 flex-shrink-0"></i> 
                <span>Klik tombol kuning "Repo" untuk menghubungkan GitHub.</span>
            </div>

            <!-- FITUR AI AUTO GENERATE SOAL -->
            <button onclick="generateSoalCerdas()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-black p-4 rounded-2xl flex justify-center items-center gap-2 transition-all shadow-md active:scale-95">
                <i data-lucide="wand-2" class="w-6 h-6"></i> BIKIN 5 SOAL TK OTOMATIS (Cerdas)
            </button>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4 pb-3 border-b-2 border-slate-100">
                    <h2 class="font-black text-xl text-slate-800">Daftar Level</h2>
                    <button onclick="bukaFormTambah()" class="bg-indigo-100 text-indigo-700 font-black px-4 py-2 rounded-xl text-sm flex gap-1 items-center hover:bg-indigo-200 transition"><i data-lucide="plus" class="w-5 h-5"></i> TAMBAH</button>
                </div>
                <div id="daftar-soal-admin" class="space-y-3"></div>
            </div>
        </main>

        <div class="fixed bottom-0 w-full max-w-[600px] p-5 bg-white/90 backdrop-blur border-t-2 z-40 flex gap-2">
            <button onclick="publishKeGitHub()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black text-xl py-4 rounded-2xl shadow-[0_8px_0_0_#059669] active:translate-y-2 active:shadow-none flex justify-center items-center gap-2 transition-all">
                <i data-lucide="upload-cloud"></i> SIMPAN & PUBLISH GITHUB
            </button>
        </div>

        <div id="modal-loading" class="hidden fixed inset-0 z-[100] bg-indigo-900/90 backdrop-blur flex flex-col justify-center items-center p-6 text-center transition-all">
            <i data-lucide="loader" class="w-16 h-16 text-white animate-spin mb-6"></i>
            <p id="loading-teks" class="text-indigo-200 font-bold text-lg">Menyinkronkan...</p>
        </div>

        <!-- Modal Config Repo -->
        <div id="modal-config" class="hidden fixed inset-0 z-[60] bg-slate-900/70 backdrop-blur-sm flex justify-center items-center p-4">
            <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl relative">
                <h2 class="font-black text-xl mb-4 flex items-center gap-2 text-indigo-800"><i data-lucide="github"></i> Setup GitHub</h2>
                <input type="password" id="gh-token" placeholder="Token (ghp_xxxx...)" class="w-full p-3 border-2 border-slate-200 rounded-xl mb-3 bg-slate-50 font-mono text-sm focus:border-indigo-400 outline-none">
                <input type="text" id="gh-repo" placeholder="username/repo" class="w-full p-3 border-2 border-slate-200 rounded-xl mb-6 bg-slate-50 font-mono text-sm focus:border-indigo-400 outline-none">
                
                <div class="bg-indigo-50 p-4 rounded-2xl mb-6 border border-indigo-100">
                    <h3 class="font-black text-sm text-indigo-800 mb-2">BGM Global (Lagu Bawaan)</h3>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="path-bgm-global" class="w-full text-xs p-2 border border-indigo-200 rounded bg-white text-indigo-700 font-bold" placeholder="Pilih dari Galeri ->" readonly>
                        <button onclick="Galeri.bukaUtama('path-bgm-global', 'audio')" class="bg-indigo-200 text-indigo-800 p-2 rounded"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                    </div>
                    <label class="text-[10px] font-bold text-slate-500">Atau upload baru:</label>
                    <input type="file" id="f-bgm" accept="audio/*" class="w-full text-xs bg-white p-2 rounded-lg border border-indigo-200">
                </div>

                <button onclick="simpanConfigLokal()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-lg shadow-md hover:bg-indigo-700 active:scale-95 transition">Hubungkan</button>
                <button onclick="tutupModal('modal-config')" class="w-full text-slate-400 font-bold py-3 mt-2 hover:text-slate-600">Batal</button>
            </div>
        </div>

        <!-- MODAL GALERI ASET CERDAS -->
        <div id="modal-galeri" class="hidden fixed inset-0 z-[80] bg-slate-100 flex flex-col max-w-[600px] mx-auto overflow-hidden">
            <header class="bg-amber-500 p-4 flex justify-between items-center shadow-md">
                <h2 class="font-black text-lg text-amber-950 flex items-center gap-2"><i data-lucide="library"></i> Galeri Aset</h2>
                <button onclick="Galeri.tutup()" class="bg-amber-600 p-2 rounded-full text-white hover:bg-amber-700"><i data-lucide="x" class="w-5 h-5"></i></button>
            </header>
            <div id="galeri-loading" class="p-8 text-center hidden">
                <i data-lucide="loader" class="w-8 h-8 text-amber-600 animate-spin mx-auto mb-2"></i>
                <p class="text-sm font-bold text-slate-500">Membaca file dari GitHub...</p>
            </div>
            <div id="galeri-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-3 gap-3 content-start"></div>
        </div>

        <!-- Modal Form Level Dinamis -->
        <div id="modal-soal" class="hidden fixed inset-0 z-[60] bg-slate-100 flex flex-col max-w-[600px] mx-auto overflow-hidden">
            <header class="bg-white p-5 flex justify-between items-center shadow-sm border-b">
                <h2 id="judul-modal-form" class="font-black text-xl text-slate-800">Edit Level</h2>
                <button onclick="tutupModal('modal-soal')" class="bg-slate-100 p-2 rounded-full text-slate-500 hover:bg-slate-200"><i data-lucide="x"></i></button>
            </header>
            
            <div class="flex-1 p-5 space-y-6 overflow-y-auto">
                <input type="hidden" id="edit-index" value="-1">

                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                    <label class="font-black text-sm block mb-2 text-indigo-800">Kategori Game</label>
                    <select id="in-kategori" onchange="UbahTampilanForm()" class="w-full p-3 border border-indigo-200 rounded-xl bg-indigo-50 font-black text-indigo-700 outline-none mb-4">
                        <option value="kuis">📝 Kuis (Pilihan Berganda)</option>
                        <option value="drag">🕹️ Drag & Drop (Tarik ke Kotak)</option>
                        <option value="urutan">🔄 Urutan Gambar (Maks 6)</option>
                        <option value="memory">🃏 Kartu Memori (Cocokkan)</option>
                    </select>

                    <label class="font-black text-sm block mb-2 text-slate-800">Teks Instruksi / Pertanyaan</label>
                    <textarea id="in-tanya" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:border-indigo-400" rows="2" placeholder="Contoh: Manakah yang buah apel?"></textarea>
                
                    <!-- Fitur Baru: Gambar pada Soal -->
                    <label class="font-black text-sm block mt-4 mb-2 text-slate-800 flex items-center gap-1"><i data-lucide="image" class="w-4 h-4 text-sky-500"></i> Gambar / Media pada Soal (Opsional)</label>
                    <div class="flex gap-2 mb-1">
                        <input type="text" id="path-media-soal" class="w-full text-xs p-2 border border-slate-200 rounded bg-slate-50" placeholder="Galeri ->" readonly>
                        <button onclick="Galeri.bukaUtama('path-media-soal', 'image')" class="bg-sky-100 text-sky-700 p-2 rounded"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                    </div>
                    <input type="file" id="f-media-soal" accept="image/*" class="w-full text-[10px] bg-white p-1.5 rounded-lg border border-slate-200">
                </div>

                <!-- WADAH DINAMIS UNTUK TARGET & PENGECOH (TAMPIL JIKA KUIS/DRAG/MEMORY) -->
                <div id="wadah-kuis-drag">
                    <div class="bg-emerald-50 p-5 rounded-3xl border border-emerald-300 shadow-sm mb-4">
                        <label class="font-black text-lg block mb-3 text-emerald-800 flex items-center gap-2"><i data-lucide="check-circle-2"></i> GAMBAR UTAMA / TARGET</label>
                        <input type="text" id="in-benar-nama" placeholder="Teks Jawaban Benar" class="w-full p-3 border border-emerald-300 rounded-xl bg-white mb-2 font-bold outline-none">
                        <div class="flex gap-2 mb-1 mt-2">
                            <input type="text" id="path-benar-img" class="w-full text-xs p-2 border border-emerald-300 rounded bg-white font-mono text-emerald-700" placeholder="Galeri ->" readonly>
                            <button onclick="Galeri.bukaUtama('path-benar-img', 'image')" class="bg-emerald-200 text-emerald-800 p-2 rounded"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                        </div>
                        <input type="file" id="f-benar-img" accept="image/*" class="w-full text-sm bg-white p-2 rounded-xl border border-emerald-300">
                    </div>

                    <div class="bg-rose-50 p-5 rounded-3xl border border-rose-300 shadow-sm mb-6">
                        <label class="font-black text-lg block mb-3 text-rose-800 flex items-center gap-2"><i data-lucide="x-circle"></i> GAMBAR LAIN (Pengecoh / Pasangan Memory)</label>
                        <!-- Pengecoh 1 -->
                        <div class="mb-4 bg-white/50 p-3 rounded-xl border border-rose-200">
                            <input type="text" id="in-p1-nama" placeholder="Teks 1" class="w-full p-2 border border-rose-200 rounded mb-1 text-sm font-bold">
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-p1-img" class="w-full text-[10px] p-2 border border-rose-200 rounded bg-white" placeholder="Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-p1-img', 'image')" class="bg-rose-200 text-rose-800 p-1.5 rounded"><i data-lucide="folder-search" class="w-3 h-3"></i></button>
                            </div>
                            <input type="file" id="f-p1-img" accept="image/*" class="w-full text-xs bg-white p-1 rounded">
                        </div>
                        <!-- Pengecoh 2 -->
                        <div class="mb-4 bg-white/50 p-3 rounded-xl border border-rose-200">
                            <input type="text" id="in-p2-nama" placeholder="Teks 2 (Opsional)" class="w-full p-2 border border-rose-200 rounded mb-1 text-sm font-bold">
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-p2-img" class="w-full text-[10px] p-2 border border-rose-200 rounded bg-white" placeholder="Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-p2-img', 'image')" class="bg-rose-200 text-rose-800 p-1.5 rounded"><i data-lucide="folder-search" class="w-3 h-3"></i></button>
                            </div>
                            <input type="file" id="f-p2-img" accept="image/*" class="w-full text-xs bg-white p-1 rounded">
                        </div>
                        <!-- Pengecoh 3 -->
                        <div class="mb-2 bg-white/50 p-3 rounded-xl border border-rose-200">
                            <input type="text" id="in-p3-nama" placeholder="Teks 3 (Opsional)" class="w-full p-2 border border-rose-200 rounded mb-1 text-sm font-bold">
                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-p3-img" class="w-full text-[10px] p-2 border border-rose-200 rounded bg-white" placeholder="Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-p3-img', 'image')" class="bg-rose-200 text-rose-800 p-1.5 rounded"><i data-lucide="folder-search" class="w-3 h-3"></i></button>
                            </div>
                            <input type="file" id="f-p3-img" accept="image/*" class="w-full text-xs bg-white p-1 rounded">
                        </div>
                    </div>
                </div>

                <!-- WADAH DINAMIS UNTUK MODE URUTAN (Maksimal 6) -->
                <div id="wadah-urutan" class="hidden">
                    <div class="bg-indigo-50 p-5 rounded-3xl border border-indigo-300 shadow-sm mb-6">
                        <label class="font-black text-lg block mb-3 text-indigo-800 flex items-center gap-2"><i data-lucide="list-ordered"></i> ITEM URUTAN GAMBAR</label>
                        <p class="text-[11px] text-indigo-600 mb-3 font-bold bg-indigo-100 p-2 rounded-lg">Isi 2 hingga 6 kotak berurutan. Kotak yang kosong akan diabaikan otomatis.</p>
                        
                        <div class="space-y-3" id="wadah-slot-urutan">
                            <!-- Di-generate lewat JS agar rapi -->
                        </div>
                    </div>
                </div>

            </div>

            <div class="bg-white p-5 border-t z-10 sticky bottom-0">
                <button onclick="simpanLevelKeDaftar()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xl py-4 rounded-2xl shadow-[0_6px_0_0_#4f46e5] active:translate-y-2 active:shadow-none transition-all flex justify-center items-center gap-2">
                    <i data-lucide="save"></i> SIMPAN LEVEL
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let dbLokal = { global_settings: {}, levels: [] };
        let antreanFile = []; 
        let fileYangHarusDihapus = []; 

        function bukaModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function tutupModal(id) { document.getElementById(id).classList.add('hidden'); }

        // MENGHASILKAN HTML SLOT URUTAN 1 - 6
        function renderSlotUrutan() {
            const wadah = document.getElementById('wadah-slot-urutan');
            let html = '';
            for(let i=1; i<=6; i++) {
                html += `
                <div class="bg-white p-3 rounded-xl border border-indigo-200 flex gap-2 items-center">
                    <div class="font-black text-indigo-400 text-xl px-2 w-6">${i}</div>
                    <div class="flex-1">
                        <input type="text" id="in-u${i}-nama" placeholder="Teks Urutan ${i}" class="w-full p-2 border border-indigo-100 rounded mb-1 text-sm font-bold">
                        <div class="flex gap-1 mb-1">
                            <input type="text" id="path-u${i}-img" class="w-full text-[10px] p-1 border rounded bg-slate-50" placeholder="Galeri" readonly>
                            <button onclick="Galeri.bukaUtama('path-u${i}-img', 'image')" class="bg-indigo-100 text-indigo-600 px-2 rounded"><i data-lucide="folder-search" class="w-3 h-3"></i></button>
                        </div>
                        <input type="file" id="f-u${i}-img" accept="image/*" class="w-full text-xs">
                    </div>
                </div>`;
            }
            wadah.innerHTML = html;
        }
        renderSlotUrutan();

        function UbahTampilanForm() {
            const val = document.getElementById('in-kategori').value;
            if(val === 'urutan') {
                document.getElementById('wadah-kuis-drag').classList.add('hidden');
                document.getElementById('wadah-urutan').classList.remove('hidden');
            } else {
                document.getElementById('wadah-kuis-drag').classList.remove('hidden');
                document.getElementById('wadah-urutan').classList.add('hidden');
            }
        }

        window.onload = () => {
            const token = localStorage.getItem('ghToken'); const repo = localStorage.getItem('ghRepo');
            if(token && repo) { document.getElementById('gh-token').value = token; document.getElementById('gh-repo').value = repo; tarikDataGitHub(); } 
            else { bukaModal('modal-config'); }
        };

        function simpanConfigLokal() {
            localStorage.setItem('ghToken', document.getElementById('gh-token').value.trim());
            localStorage.setItem('ghRepo', document.getElementById('gh-repo').value.trim());
            const fBgm = document.getElementById('f-bgm').files[0]; const pBgm = document.getElementById('path-bgm-global').value;
            if(fBgm) {
                dbLokal.global_settings.bgm_url = `assets/bgm_glbl.${fBgm.name.split('.').pop()}`; antreanFile.push({ path: `public/${dbLokal.global_settings.bgm_url}`, file: fBgm });
            } else if(pBgm) { dbLokal.global_settings.bgm_url = pBgm; }
            tutupModal('modal-config'); tarikDataGitHub();
        }

        // =========================================================================
        // AI BANK SOAL TK (Cerdas Anti Duplikat)
        // =========================================================================
        const BANK_SOAL_TK = [
            { k: "kuis", t: "Matematika: Ada berapa jumlah matahari ini? ☀️☀️", tg: "Dua", pg: ["Satu", "Tiga", "Empat"] },
            { k: "drag", t: "Sains: Tarik awan ke langit (kotak)!", tg: "Awan", pg: ["Batu", "Kayu"] },
            { k: "kuis", t: "Akhlaq: Jika diberi hadiah, kita harus bilang apa?", tg: "Terima Kasih", pg: ["Marah", "Diam", "Nangis"] },
            { k: "kuis", t: "Hewan Darat: Mana yang termasuk hewan peliharaan?", tg: "Kucing", pg: ["Harimau", "Buaya", "Hiu"] },
            { k: "urutan", t: "Logika: Urutkan angka 1 sampai 4!", u: ["Satu 1", "Dua 2", "Tiga 3", "Empat 4"] },
            { k: "memory", t: "Ingatan: Cocokkan buah yang sama!", tg: "Apel", pg: ["Pisang", "Jeruk", "Anggur"] },
            { k: "kuis", t: "Warna: Warna apa daun pada pohon?", tg: "Hijau", pg: ["Merah", "Biru", "Kuning"] },
            { k: "urutan", t: "Sains: Urutkan dari pagi ke malam!", u: ["Matahari Terbit", "Siang Terang", "Sore", "Bulan Bintang"] },
            { k: "drag", t: "Kendaraan: Tarik perahu ke kotak air!", tg: "Perahu", pg: ["Mobil", "Sepeda"] },
            { k: "kuis", t: "Tubuh Kita: Kita melihat menggunakan?", tg: "Mata", pg: ["Telinga", "Kaki", "Tangan"] }
        ];

        function generateSoalCerdas() {
            if(!confirm("Tambahkan 5 soal acak baru?")) return;
            
            // Ambil semua teks pertanyaan yang SUDAH ADA di level agar tidak kembar
            const soalTersedia = dbLokal.levels ? dbLokal.levels.map(l => l.pertanyaan) : [];
            
            // Filter Bank Soal: Hanya ambil soal yang pertanyaannya belum ada
            const bankTerfilter = BANK_SOAL_TK.filter(soal => !soalTersedia.includes(soal.t));
            
            if(bankTerfilter.length === 0) return alert("Semua soal di Bank Soal sudah kamu gunakan!");

            // Acak (Shuffle) dan ambil maksimal 5 soal
            const diambil = bankTerfilter.sort(() => 0.5 - Math.random()).slice(0, 5);
            const tsBase = Date.now();

            diambil.forEach((soal, i) => {
                let obj = { id: `L_AUTO_${tsBase}_${i}`, kategori: soal.k, pertanyaan: soal.t };
                
                if (soal.k === 'urutan') {
                    obj.item_urutan = [];
                    soal.u.forEach((txt, idx) => { obj.item_urutan.push({ nama: txt, indexAsli: idx }); });
                } else {
                    obj.item_target = { nama: soal.tg, isTarget: true };
                    obj.item_pengecoh = [];
                    soal.pg.forEach(txt => { obj.item_pengecoh.push({ nama: txt, isTarget: false }); });
                }
                dbLokal.levels.push(obj);
            });

            renderDaftarLevel();
            alert(`Berhasil menambahkan ${diambil.length} soal baru secara acak! Jangan lupa klik SIMPAN & PUBLISH.`);
        }

        async function tarikDataGitHub() {
            const token = localStorage.getItem('ghToken'); const repo = localStorage.getItem('ghRepo');
            const statusEl = document.getElementById('admin-status');
            statusEl.innerHTML = `<i data-lucide="refresh-cw" class="w-6 h-6 animate-spin text-indigo-500"></i> <span class="text-indigo-800">Menghubungkan...</span>`;
            
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/public/data-soal.json?v=${Date.now()}`, { headers: { 'Authorization': `token ${token}` } });
                
                if(res.ok) {
                    const data = await res.json(); const parsed = JSON.parse(decodeURIComponent(escape(window.atob(data.content))));
                    dbLokal.global_settings = parsed.global_settings || {}; dbLokal.levels = parsed.levels || [];
                    statusEl.innerHTML = `<i data-lucide="check-circle" class="w-6 h-6 text-emerald-500"></i> <span class="text-emerald-800">Terhubung: ${repo}</span>`;
                } else if (res.status === 404) {
                    dbLokal = { global_settings: {}, levels: [] };
                    statusEl.innerHTML = `<i data-lucide="info" class="w-6 h-6 text-sky-500"></i> <span class="text-sky-800">Repo Kosong. Klik Bikin Soal Otomatis!</span>`;
                } else throw new Error(`Akses Ditolak.`);
            } catch(e) { statusEl.innerHTML = `<i data-lucide="x-circle" class="w-6 h-6 text-rose-500"></i> <span class="text-rose-800">Error: ${e.message}</span>`; }
            lucide.createIcons(); renderDaftarLevel();
        }

        function renderDaftarLevel() {
            const wadah = document.getElementById('daftar-soal-admin'); wadah.innerHTML = '';
            if(!dbLokal.levels || dbLokal.levels.length === 0) return wadah.innerHTML = `<div class="text-center p-10"><p>Belum ada Level.</p></div>`;

            dbLokal.levels.forEach((lvl, idx) => {
                wadah.innerHTML += `
                    <div class="border border-slate-200 p-4 rounded-2xl flex justify-between items-center bg-white shadow-sm hover:border-indigo-300">
                        <div class="overflow-hidden">
                            <span class="text-[10px] font-black text-white uppercase px-2 py-1 bg-indigo-500 rounded-lg">${lvl.kategori}</span>
                            <span class="text-sm font-black text-slate-400 ml-2">Level ${idx + 1}</span>
                            <h3 class="font-bold text-base text-slate-800 mt-2 truncate w-48">${lvl.pertanyaan}</h3>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="bukaFormEdit(${idx})" class="text-indigo-600 bg-indigo-50 p-3 rounded-xl hover:bg-indigo-600 hover:text-white transition"><i data-lucide="edit-3" class="w-5 h-5"></i></button>
                            <button onclick="hapusLevel(${idx})" class="text-rose-600 bg-rose-50 p-3 rounded-xl hover:bg-rose-600 hover:text-white transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function hapusLevel(idx) { if(confirm("Hapus level ini?")) { dbLokal.levels.splice(idx, 1); renderDaftarLevel(); } }

        function bukaFormTambah() {
            document.getElementById('judul-modal-form').innerText = "Buat Level Baru";
            document.getElementById('edit-index').value = "-1"; 
            document.querySelectorAll('#modal-soal input[type="text"], #modal-soal textarea').forEach(el => el.value = '');
            document.querySelectorAll('#modal-soal input[type="file"]').forEach(el => el.value = '');
            document.getElementById('in-kategori').value = 'kuis'; UbahTampilanForm();
            bukaModal('modal-soal');
        }

        function bukaFormEdit(idx) {
            const data = dbLokal.levels[idx];
            document.getElementById('judul-modal-form').innerText = `Edit Level ${idx + 1}`;
            document.getElementById('edit-index').value = idx; 
            
            document.getElementById('in-kategori').value = data.kategori || 'kuis';
            UbahTampilanForm();
            document.getElementById('in-tanya').value = data.pertanyaan;
            document.getElementById('path-media-soal').value = data.media_soal || "";

            if (data.kategori === 'urutan') {
                if(data.item_urutan) {
                    for(let i=0; i<6; i++) {
                        if(data.item_urutan[i]) {
                            document.getElementById(`in-u${i+1}-nama`).value = data.item_urutan[i].nama;
                            document.getElementById(`path-u${i+1}-img`).value = data.item_urutan[i].url_gambar||"";
                        }
                    }
                }
            } else {
                document.getElementById('in-benar-nama').value = data.item_target ? data.item_target.nama : "";
                document.getElementById('path-benar-img').value = data.item_target ? data.item_target.url_gambar : "";
                if(data.item_pengecoh) {
                    for(let i=0; i<3; i++) {
                        if(data.item_pengecoh[i]) {
                            document.getElementById(`in-p${i+1}-nama`).value = data.item_pengecoh[i].nama;
                            document.getElementById(`path-p${i+1}-img`).value = data.item_pengecoh[i].url_gambar||"";
                        }
                    }
                }
            }
            document.querySelectorAll('#modal-soal input[type="file"]').forEach(el => el.value = '');
            bukaModal('modal-soal');
        }

        function simpanLevelKeDaftar() {
            const ts = Date.now();
            const idxEdit = parseInt(document.getElementById('edit-index').value);
            const kategori = document.getElementById('in-kategori').value;
            const tanya = document.getElementById('in-tanya').value.trim();
            
            if(!tanya) return alert("Pertanyaan WAJIB diisi!");
            if(!dbLokal.levels) dbLokal.levels = [];

            let objLevel = { id: `L_${ts}`, kategori: kategori, pertanyaan: tanya };

            const cekM = (idF, idP, prp, prx) => {
                const f = document.getElementById(idF).files[0]; const p = document.getElementById(idP).value;
                if(f) { objLevel[prp] = `assets/${prx}_${ts}.${f.name.split('.').pop()}`; antreanFile.push({path: `public/${objLevel[prp]}`, file: f}); }
                else if(p) { objLevel[prp] = p; } else { objLevel[prp] = null; }
            };

            cekM('f-media-soal', 'path-media-soal', 'media_soal', 'msoal');

            if (kategori === 'urutan') {
                objLevel.item_urutan = [];
                for(let i=1; i<=6; i++) {
                    const nm = document.getElementById(`in-u${i}-nama`).value;
                    const fU = document.getElementById(`f-u${i}-img`).files[0]; const pU = document.getElementById(`path-u${i}-img`).value;
                    if(nm || fU || pU) {
                        let uObj = { indexAsli: objLevel.item_urutan.length, nama: nm || `Ke-${i}` };
                        if(fU) { uObj.url_gambar = `assets/u${i}_${ts}.${fU.name.split('.').pop()}`; antreanFile.push({path: `public/${uObj.url_gambar}`, file: fU}); }
                        else if(pU) { uObj.url_gambar = pU; }
                        objLevel.item_urutan.push(uObj);
                    }
                }
            } else {
                objLevel.item_target = { isTarget: true };
                objLevel.item_target.nama = document.getElementById('in-benar-nama').value || "Benar";
                const fB = document.getElementById('f-benar-img').files[0]; const pB = document.getElementById('path-benar-img').value;
                if(fB) { objLevel.item_target.url_gambar = `assets/tgt_${ts}.${fB.name.split('.').pop()}`; antreanFile.push({path: `public/${objLevel.item_target.url_gambar}`, file: fB}); }
                else if(pB) { objLevel.item_target.url_gambar = pB; }

                objLevel.item_pengecoh = [];
                for(let i=1; i<=3; i++) {
                    const nm = document.getElementById(`in-p${i}-nama`).value;
                    const fP = document.getElementById(`f-p${i}-img`).files[0]; const pP = document.getElementById(`path-p${i}-img`).value;
                    if(nm || fP || pP) {
                        let pObj = { nama: nm || "Pilihan", isTarget: false };
                        if(fP) { pObj.url_gambar = `assets/p${i}_${ts}.${fP.name.split('.').pop()}`; antreanFile.push({path: `public/${pObj.url_gambar}`, file: fP}); }
                        else if(pP) { pObj.url_gambar = pP; }
                        objLevel.item_pengecoh.push(pObj);
                    }
                }
            }

            if (idxEdit > -1) dbLokal.levels[idxEdit] = objLevel; else dbLokal.levels.push(objLevel);
            renderDaftarLevel(); tutupModal('modal-soal');
        }

        const Galeri = {
            targetInputId: null, filterType: 'all', 
            bukaUtama(inputId, type) { this.targetInputId = inputId; this.filterType = type; document.getElementById('modal-galeri').classList.remove('hidden'); this.fetchDataGitHub(); },
            tutup() { document.getElementById('modal-galeri').classList.add('hidden'); },
            async fetchDataGitHub() {
                const token = localStorage.getItem('ghToken'); const repo = localStorage.getItem('ghRepo');
                const grid = document.getElementById('galeri-grid'); const loader = document.getElementById('galeri-loading');
                grid.innerHTML = ''; loader.classList.remove('hidden');
                try {
                    const res = await fetch(`https://api.github.com/repos/${repo}/contents/public/assets?v=${Date.now()}`, { headers: { 'Authorization': `token ${token}` } });
                    loader.classList.add('hidden');
                    if(res.ok) {
                        const files = await res.json();
                        if(files.length === 0) return grid.innerHTML = `<p class="col-span-3 text-center">Belum ada aset.</p>`;
                        files.forEach(file => {
                            const isImage = file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i); const isAudio = file.name.match(/\.(mp3|wav|ogg|m4a)$/i);
                            if (this.filterType === 'image' && !isImage) return; if (this.filterType === 'audio' && !isAudio) return;
                            const btn = document.createElement('div');
                            btn.className = "bg-white p-2 rounded-xl shadow-sm border border-slate-200 cursor-pointer text-center";
                            btn.onclick = () => this.pilihAset(`assets/${file.name}`);
                            if (isImage) btn.innerHTML = `<img src="https://raw.githubusercontent.com/${repo}/main/public/assets/${file.name}" class="w-full h-16 object-cover rounded-lg mb-1"><span class="text-[9px] truncate w-full">${file.name}</span>`;
                            else btn.innerHTML = `<div class="w-full h-16 bg-amber-50 rounded-lg mb-1 flex items-center justify-center"><i data-lucide="music" class="w-8 h-8 text-amber-300"></i></div><span class="text-[9px] truncate w-full">${file.name}</span>`;
                            grid.appendChild(btn);
                        }); lucide.createIcons();
                    } else throw new Error();
                } catch(e) { loader.classList.add('hidden'); grid.innerHTML = `<p class="col-span-3 text-center">Folder Aset kosong/error.</p>`; }
            },
            pilihAset(pathStr) { if (this.targetInputId) document.getElementById(this.targetInputId).value = pathStr; this.tutup(); }
        };

        const ubahFileKeBase64 = (file) => new Promise((r) => { const rd = new FileReader(); rd.readAsDataURL(file); rd.onload = () => { let b64 = rd.result.replace(/^data:(.*,)?/, ''); if(b64.length%4>0) b64 += '='.repeat(4-(b64.length%4)); r(b64); }; });
        async function githubPutRequest(token, repo, path, base64Content) {
            const url = `https://api.github.com/repos/${repo}/contents/${path}`; let sha = null;
            try { const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } }); if(getRes.ok) sha = (await getRes.json()).sha; } catch(e) {} 
            const bodyData = { message: `CMS Update: ${path}`, content: base64Content }; if (sha) bodyData.sha = sha;
            const putRes = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData) });
            if(!putRes.ok) throw new Error(`Upload Gagal: ${path}`);
        }
        async function publishKeGitHub() {
            const token = localStorage.getItem('ghToken'); const repo = localStorage.getItem('ghRepo');
            if(!token || !repo) return alert("Hubungkan Token GitHub!");
            const modLoad = document.getElementById('modal-loading'); document.getElementById('loading-teks').innerText = "Mengupload..."; modLoad.classList.remove('hidden');
            try {
                for(let i=0; i<antreanFile.length; i++) { await githubPutRequest(token, repo, antreanFile[i].path, await ubahFileKeBase64(antreanFile[i].file)); }
                document.getElementById('loading-teks').innerText = "Menyinkronkan Database...";
                await githubPutRequest(token, repo, 'public/data-soal.json', window.btoa(unescape(encodeURIComponent(JSON.stringify(dbLokal, null, 2)))));
                antreanFile = []; fileYangHarusDihapus = []; setTimeout(() => { modLoad.classList.add('hidden'); alert("Berhasil Publish!"); }, 1000);
            } catch(e) { alert("ERROR: " + e.message); modLoad.classList.add('hidden'); }
        }
    </script>
</body>
