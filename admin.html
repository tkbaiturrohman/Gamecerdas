<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS Admin Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #f1f5f9; }
        .app-container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 25px rgba(0,0,0,0.05); position: relative; }
    </style>
</head>
<body>

    <div class="app-container flex flex-col pb-28">
        <!-- Header -->
        <header class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2"><i data-lucide="layout-dashboard"></i> CMS Game</h1>
            <div class="flex gap-2">
                <button onclick="window.location.href='index.html'" class="bg-indigo-800 p-2 rounded-lg hover:bg-indigo-900 shadow" title="Main Game"><i data-lucide="play" class="w-5 h-5"></i></button>
                <button onclick="bukaModal('modal-config')" class="bg-amber-500 text-amber-950 p-2 rounded-lg hover:bg-amber-400 font-bold flex items-center gap-1"><i data-lucide="settings" class="w-5 h-5"></i> Repo</button>
            </div>
        </header>

        <main class="flex-1 p-5 space-y-6">
            <div id="admin-status" class="bg-yellow-50 border-2 border-yellow-200 text-yellow-800 p-4 rounded-xl text-sm font-bold flex items-center gap-3 shadow-sm">
                <i data-lucide="alert-circle" class="w-6 h-6 flex-shrink-0"></i> 
                <span>Belum terhubung! Klik tombol kuning "Repo" di atas.</span>
            </div>

            <!-- Daftar Level -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4 pb-2 border-b">
                    <h2 class="font-black text-lg text-slate-800">Daftar Soal & Level</h2>
                    <button onclick="bukaFormTambah()" class="bg-indigo-100 text-indigo-700 font-black px-4 py-2 rounded-xl text-sm flex gap-1 items-center transition"><i data-lucide="plus-circle" class="w-5 h-5"></i> TAMBAH</button>
                </div>
                <div id="daftar-soal-admin" class="space-y-3"></div>
            </div>
        </main>

        <!-- Tombol Publish -->
        <div class="fixed bottom-0 w-full max-w-[600px] p-5 bg-white/90 backdrop-blur border-t z-40">
            <button onclick="publishKeGitHub()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black text-lg py-4 rounded-2xl shadow-[0_6px_0_0_#059669] active:translate-y-2 active:shadow-none flex justify-center items-center gap-2 transition-all">
                <i data-lucide="upload-cloud"></i> SIMPAN & PUBLISH KE GITHUB
            </button>
        </div>

        <!-- Overlay Loading -->
        <div id="modal-loading" class="hidden fixed inset-0 z-[100] bg-white/95 flex flex-col justify-center items-center p-6 text-center">
            <div class="bg-indigo-100 p-4 rounded-full mb-6"><i data-lucide="loader" class="w-12 h-12 text-indigo-600 animate-spin"></i></div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Menyinkronkan...</h3>
            <p id="loading-teks" class="text-slate-500 font-bold text-lg">Menghubungi GitHub...</p>
        </div>

        <!-- Modal Repo -->
        <div id="modal-config" class="hidden fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-sm flex justify-center items-center p-4">
            <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl relative">
                <h2 class="font-black text-xl mb-4 flex items-center gap-2 text-indigo-800"><i data-lucide="github"></i> Setup GitHub</h2>
                
                <label class="text-xs font-bold text-slate-700 block mb-1">Personal Access Token</label>
                <input type="password" id="gh-token" placeholder="ghp_xxxx..." class="w-full p-3 border-2 border-slate-200 rounded-xl mb-4 bg-slate-50 font-mono text-sm">
                
                <label class="text-xs font-bold text-slate-700 block mb-1">Username/Nama-Repo</label>
                <input type="text" id="gh-repo" placeholder="cth: budi/game" class="w-full p-3 border-2 border-slate-200 rounded-xl mb-6 bg-slate-50 font-mono text-sm">
                
                <button onclick="simpanConfigLokal()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-lg shadow-md mb-2">Simpan Koneksi</button>
                <button onclick="tutupModal('modal-config')" class="w-full text-slate-400 font-bold py-3 hover:text-slate-600">Batal</button>
            </div>
        </div>

        <!-- Modal Form Soal (Edit / Tambah) -->
        <div id="modal-soal" class="hidden fixed inset-0 z-[60] bg-slate-100 flex flex-col max-w-[600px] mx-auto">
            <header class="bg-white p-4 flex justify-between items-center shadow-sm border-b">
                <h2 id="judul-modal-form" class="font-black text-xl text-slate-800">Buat Level Baru</h2>
                <button onclick="tutupModal('modal-soal')" class="bg-slate-100 p-2 rounded-full text-slate-600"><i data-lucide="x"></i></button>
            </header>
            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <input type="hidden" id="edit-index" value="-1">

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <label class="font-black text-sm block mb-2 text-indigo-800">Mode Permainan</label>
                    <select id="in-kategori" class="w-full p-3 border-2 border-indigo-100 rounded-xl bg-indigo-50 font-bold text-indigo-700 outline-none">
                        <option value="drag">🕹️ Drag & Drop</option>
                        <option value="kuis">📝 Kuis (Pilihan Ganda)</option>
                    </select>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <label class="font-black text-sm block mb-2 text-slate-800">Teks Pertanyaan</label>
                    <textarea id="in-tanya" class="w-full p-3 border-2 border-slate-200 rounded-xl bg-slate-50 outline-none" rows="2" placeholder="Contoh pertanyaan..."></textarea>
                </div>

                <div class="bg-emerald-50 p-4 rounded-2xl border-2 border-emerald-200">
                    <label class="font-black text-base block mb-3 text-emerald-800 flex items-center gap-2"><i data-lucide="check-circle-2"></i> JAWABAN BENAR</label>
                    <input type="text" id="in-benar-nama" placeholder="Teks Jawaban" class="w-full p-3 border border-emerald-300 rounded-xl bg-white mb-3 font-bold text-slate-700">
                    <label class="text-xs font-bold block text-emerald-700 mb-1">Gambar Baru (Kosongkan jika tak ingin ganti):</label>
                    <input type="file" id="f-benar-img" accept="image/*" class="w-full text-sm bg-white p-2 rounded border border-emerald-200">
                </div>

                <div class="bg-rose-50 p-4 rounded-2xl border-2 border-rose-200 mb-8">
                    <label class="font-black text-base block mb-2 text-rose-800 flex items-center gap-2"><i data-lucide="x-circle"></i> PENGECOH / SALAH</label>
                    <p class="text-[11px] text-rose-600 mb-3 font-bold bg-rose-100/50 p-2 rounded">Teks dipisah koma. Gambar bisa pilih banyak.</p>
                    <input type="text" id="in-salah-nama" placeholder="Contoh: Sapi, Kucing" class="w-full p-3 border border-rose-300 rounded-xl bg-white mb-3 font-bold text-slate-700">
                    <label class="text-xs font-bold block text-rose-700 mb-1">Gambar Pengecoh Baru:</label>
                    <input type="file" id="f-salah-img" accept="image/*" multiple class="w-full text-sm bg-white p-2 rounded border border-rose-200">
                </div>
            </div>
            <div class="bg-white p-5 border-t">
                <button onclick="simpanLevelKeDaftar()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-lg py-4 rounded-2xl shadow-lg active:translate-y-1 transition-all flex justify-center items-center gap-2">
                    <i data-lucide="save"></i> SIMPAN LEVEL INI
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let dbLokal = { global_settings: {}, levels: [] };
        let antreanFile = []; 

        function bukaModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function tutupModal(id) { document.getElementById(id).classList.add('hidden'); }

        window.onload = () => {
            const token = localStorage.getItem('ghToken');
            const repo = localStorage.getItem('ghRepo');
            if(token && repo) {
                document.getElementById('gh-token').value = token;
                document.getElementById('gh-repo').value = repo;
                tarikDataGitHub();
            } else {
                bukaModal('modal-config');
            }
        };

        function simpanConfigLokal() {
            localStorage.setItem('ghToken', document.getElementById('gh-token').value.trim());
            localStorage.setItem('ghRepo', document.getElementById('gh-repo').value.trim());
            tutupModal('modal-config');
            tarikDataGitHub();
        }

        async function tarikDataGitHub() {
            const token = localStorage.getItem('ghToken');
            const repo = localStorage.getItem('ghRepo');
            const statusEl = document.getElementById('admin-status');

            statusEl.innerHTML = `<i data-lucide="refresh-cw" class="w-6 h-6 animate-spin text-blue-500"></i> <span class="text-blue-800">Menghubungkan ke GitHub...</span>`;
            statusEl.className = "bg-blue-50 border-2 border-blue-200 p-4 rounded-xl text-sm font-bold flex items-center gap-3 shadow-sm";
            lucide.createIcons();

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/public/data-soal.json?v=${Date.now()}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if(res.ok) {
                    const data = await res.json();
                    const parsed = JSON.parse(decodeURIComponent(escape(window.atob(data.content))));
                    dbLokal.global_settings = parsed.global_settings || {};
                    dbLokal.levels = parsed.levels || [];
                    
                    statusEl.innerHTML = `<i data-lucide="check-circle-2" class="w-6 h-6 text-emerald-500"></i> <span class="text-emerald-800">Terhubung ke Repo: ${repo}</span>`;
                    statusEl.className = "bg-emerald-50 border-2 border-emerald-200 p-4 rounded-xl text-sm font-bold flex items-center gap-3 shadow-sm";
                } else if (res.status === 404) {
                    dbLokal = { global_settings: {}, levels: [] };
                    statusEl.innerHTML = `<i data-lucide="info" class="w-6 h-6 text-indigo-500"></i> <span class="text-indigo-800">JSON baru akan terbuat saat di-Publish.</span>`;
                    statusEl.className = "bg-indigo-50 border-2 border-indigo-200 p-4 rounded-xl text-sm font-bold flex items-center gap-3 shadow-sm";
                } else {
                    throw new Error(`Akses Ditolak.`);
                }
            } catch(e) {
                statusEl.innerHTML = `<i data-lucide="x-circle" class="w-6 h-6 text-rose-500"></i> <span class="text-rose-800">Gagal: ${e.message}</span>`;
                statusEl.className = "bg-rose-50 border-2 border-rose-200 p-4 rounded-xl text-sm font-bold flex items-center gap-3 shadow-sm";
            }
            
            lucide.createIcons();
            renderDaftarLevel();
        }

        function renderDaftarLevel() {
            const wadah = document.getElementById('daftar-soal-admin');
            wadah.innerHTML = '';
            
            if(!dbLokal.levels || dbLokal.levels.length === 0) {
                wadah.innerHTML = `<div class="text-center p-8 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl"><p class="text-slate-500 font-bold">Belum ada Level dibuat.</p></div>`;
                return;
            }

            dbLokal.levels.forEach((lvl, idx) => {
                wadah.innerHTML += `
                    <div class="border-2 border-slate-100 p-4 rounded-2xl flex justify-between items-center bg-white shadow-sm hover:border-indigo-200">
                        <div class="overflow-hidden">
                            <span class="text-[10px] font-black text-indigo-600 uppercase px-2 py-1 bg-indigo-100 rounded-lg">${lvl.kategori}</span>
                            <span class="text-sm font-black text-slate-400 ml-2">Level ${idx + 1}</span>
                            <h3 class="font-bold text-base text-slate-800 mt-2 truncate max-w-[200px]">${lvl.pertanyaan}</h3>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="bukaFormEdit(${idx})" class="text-blue-500 bg-blue-50 p-3 rounded-xl hover:bg-blue-500 hover:text-white transition shadow-sm"><i data-lucide="edit-3" class="w-5 h-5"></i></button>
                            <button onclick="hapusLevel(${idx})" class="text-rose-500 bg-rose-50 p-3 rounded-xl hover:bg-rose-500 hover:text-white transition shadow-sm"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function hapusLevel(idx) {
            if(confirm("Yakin hapus level ini? (Pastikan klik tombol Publish di bawah setelah menghapus!)")) {
                dbLokal.levels.splice(idx, 1);
                renderDaftarLevel();
            }
        }

        function bukaFormTambah() {
            document.getElementById('judul-modal-form').innerText = "Buat Level Baru";
            document.getElementById('edit-index').value = "-1";
            
            document.getElementById('in-tanya').value = '';
            document.getElementById('in-benar-nama').value = '';
            document.getElementById('in-salah-nama').value = '';
            document.getElementById('f-benar-img').value = '';
            document.getElementById('f-salah-img').value = '';
            bukaModal('modal-soal');
        }

        function bukaFormEdit(idx) {
            const data = dbLokal.levels[idx];
            document.getElementById('judul-modal-form').innerText = `Edit Level ${idx + 1}`;
            document.getElementById('edit-index').value = idx;
            
            document.getElementById('in-kategori').value = data.kategori;
            document.getElementById('in-tanya').value = data.pertanyaan;
            document.getElementById('in-benar-nama').value = data.item_target.nama || "";
            
            // Gabungkan nama pengecoh untuk ditampilkan di form
            let teksPengecoh = "";
            if (data.item_pengecoh) {
                teksPengecoh = data.item_pengecoh.map(p => p.nama).join(', ');
            }
            document.getElementById('in-salah-nama').value = teksPengecoh;
            
            bukaModal('modal-soal');
        }

        function simpanLevelKeDaftar() {
            const ts = Date.now();
            const idxEdit = parseInt(document.getElementById('edit-index').value);
            const tanya = document.getElementById('in-tanya').value.trim();
            const benarNama = document.getElementById('in-benar-nama').value.trim();
            
            if(!tanya || !benarNama) return alert("Pertanyaan dan Jawaban Benar WAJIB diisi!");

            if(!dbLokal.levels) dbLokal.levels = [];

            // Jika Mode Edit, pakai data lama sebagai dasar. Jika Tambah, buat baru.
            let objLevel = (idxEdit > -1) ? {...dbLokal.levels[idxEdit]} : {
                id: `L_${ts}`, audio_soal: null,
                item_target: { nama: benarNama, isTarget: true, url_gambar: null },
                item_pengecoh: []
            };

            objLevel.kategori = document.getElementById('in-kategori').value;
            objLevel.pertanyaan = tanya;
            objLevel.item_target.nama = benarNama;

            // Proses Target Image
            const fTarget = document.getElementById('f-benar-img').files[0];
            if(fTarget) {
                objLevel.item_target.url_gambar = `assets/tgt_${ts}.${fTarget.name.split('.').pop()}`;
                antreanFile.push({ path: `public/${objLevel.item_target.url_gambar}`, file: fTarget });
            }

            // Proses Pengecoh
            const textPengecoh = document.getElementById('in-salah-nama').value.split(',').map(s => s.trim()).filter(s => s);
            const filePengecoh = document.getElementById('f-salah-img').files;

            // Jika ada input baru di form Pengecoh, kita timpa array lamanya
            if (textPengecoh.length > 0 || filePengecoh.length > 0) {
                objLevel.item_pengecoh = []; // Reset pengecoh lama
                let maxLen = Math.max(textPengecoh.length, filePengecoh.length);
                for(let i=0; i<maxLen; i++) {
                    let pgc = { nama: textPengecoh[i] || "Pilihan", isTarget: false, url_gambar: null };
                    if(filePengecoh[i]) {
                        pgc.url_gambar = `assets/pgc_${ts}_${i}.${filePengecoh[i].name.split('.').pop()}`;
                        antreanFile.push({ path: `public/${pgc.url_gambar}`, file: filePengecoh[i] });
                    }
                    objLevel.item_pengecoh.push(pgc);
                }
            }

            // Simpan Perubahan (Edit / Tambah)
            if (idxEdit > -1) {
                dbLokal.levels[idxEdit] = objLevel;
            } else {
                dbLokal.levels.push(objLevel);
            }

            renderDaftarLevel();
            tutupModal('modal-soal');
        }

        // --- ENGINE API GITHUB ---
        const ubahFileKeBase64 = (file) => new Promise((resolve) => { 
            const r = new FileReader(); 
            r.readAsDataURL(file); 
            r.onload = () => { 
                let b64 = r.result.replace(/^data:(.*,)?/, ''); 
                if(b64.length % 4 > 0) b64 += '='.repeat(4 - (b64.length % 4)); 
                resolve(b64); 
            }; 
        });

        async function githubPutRequest(token, repo, path, base64Content) {
            const url = `https://api.github.com/repos/${repo}/contents/${path}`;
            let sha = null;
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                if(getRes.ok) sha = (await getRes.json()).sha;
            } catch(e) {} 

            const bodyData = { message: `CMS Update: ${path}`, content: base64Content };
            if (sha) bodyData.sha = sha;

            const putRes = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            });
            if(!putRes.ok) throw new Error(`API Gagal di path: ${path}`);
        }

        async function publishKeGitHub() {
            const token = localStorage.getItem('ghToken');
            const repo = localStorage.getItem('ghRepo');
            if(!token || !repo) return alert("Silakan hubungkan Token GitHub terlebih dahulu!");

            const modLoad = document.getElementById('modal-loading');
            const tLoad = document.getElementById('loading-teks');
            modLoad.classList.remove('hidden');

            try {
                for(let i=0; i<antreanFile.length; i++) {
                    tLoad.innerText = `Menyimpan Gambar ${i+1}/${antreanFile.length}...`;
                    const b64 = await ubahFileKeBase64(antreanFile[i].file);
                    await githubPutRequest(token, repo, antreanFile[i].path, b64);
                }

                tLoad.innerText = `Mengupdate Database Soal...`;
                const jsonStr = JSON.stringify(dbLokal, null, 2);
                const jsonB64 = window.btoa(unescape(encodeURIComponent(jsonStr)));
                await githubPutRequest(token, repo, 'public/data-soal.json', jsonB64);

                tLoad.innerText = `Selesai!`;
                antreanFile = []; // Reset Antrean
                
                setTimeout(() => {
                    modLoad.classList.add('hidden');
                    alert("Berhasil! Silakan klik tombol Putar (ikon ▶️) di kanan atas untuk bermain.\nCatatan: GitHub butuh waktu sekitar 1 menit untuk menerapkan pembaruan.");
                }, 1000);

            } catch(e) {
                alert("TERJADI ERROR: " + e.message);
                modLoad.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
