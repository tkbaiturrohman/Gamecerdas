<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS Admin Pintar</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f8fafc; }
        .app-container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 25px rgba(0,0,0,0.05); position: relative; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .toast-enter { animation: slideInDown 0.3s forwards; }
        .toast-leave { animation: slideOutUp 0.3s forwards; }
        @keyframes slideInDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        @keyframes slideOutUp { from { transform: translate(-50%, 0); opacity: 1; } to { transform: translate(-50%, -100%); opacity: 0; } }
    </style>
</head>
<body>

    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div id="modal-confirm" class="hidden fixed inset-0 z-[9999] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] p-6 max-w-sm w-full text-center shadow-2xl relative overflow-hidden">
            <div class="mx-auto flex justify-center mb-3"><div class="bg-rose-100 p-3 rounded-full"><i data-lucide="alert-triangle" class="w-8 h-8 text-rose-500"></i></div></div>
            <h2 class="text-xl font-black mb-2 text-slate-800">Konfirmasi</h2>
            <p id="confirm-text" class="text-slate-500 font-bold mb-6 text-sm">Apakah kamu yakin?</p>
            <div class="flex gap-2">
                <button id="btn-confirm-no" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200">Batal</button>
                <button id="btn-confirm-yes" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl shadow-sm hover:bg-rose-600">Ya</button>
            </div>
        </div>
    </div>

    <div class="app-container flex flex-col pb-28">
        <header class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
            <h1 class="text-xl font-black flex items-center gap-2"><i data-lucide="server"></i> Panel Admin Game</h1>
            <div class="flex gap-2">
                <button onclick="window.location.href='index.html'" class="bg-indigo-800 p-2 rounded-xl hover:bg-indigo-900 transition" title="Main Game"><i data-lucide="play" class="w-5 h-5"></i></button>
                <button onclick="bukaModal('modal-config')" class="bg-amber-400 text-amber-950 p-2 rounded-xl hover:bg-amber-300 font-bold flex items-center gap-1 transition"><i data-lucide="settings" class="w-5 h-5"></i> Repo</button>
            </div>
        </header>

        <main class="flex-1 p-5 space-y-4">
            <div id="admin-status" class="bg-yellow-50 border-2 border-yellow-200 text-yellow-800 p-4 rounded-2xl text-sm font-bold flex items-center justify-between shadow-sm transition-colors duration-300">
                <div class="flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-6 h-6 flex-shrink-0" id="icon-status"></i> 
                    <span id="text-status">Klik tombol kuning "Repo".</span>
                </div>
                <button onclick="tarikDataGitHub(true)" class="bg-white/50 p-2 rounded-lg hover:bg-white transition" title="Tarik Paksa Data Github"><i data-lucide="refresh-cw" id="icon-sync" class="w-4 h-4"></i></button>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="document.getElementById('file-import').click()" class="bg-white border-2 border-slate-200 hover:border-indigo-400 text-slate-700 p-3 rounded-xl font-bold flex items-center justify-center gap-2 text-sm transition shadow-sm">
                    <i data-lucide="download" class="w-4 h-4"></i> Import JSON
                </button>
                <input type="file" id="file-import" accept=".json" class="hidden" onchange="importJSON(event)">
                
                <button onclick="exportJSON()" class="bg-white border-2 border-slate-200 hover:border-indigo-400 text-slate-700 p-3 rounded-xl font-bold flex items-center justify-center gap-2 text-sm transition shadow-sm">
                    <i data-lucide="upload" class="w-4 h-4"></i> Export Backup
                </button>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="ProceduralGenerator.buatAcak9()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black p-3 rounded-xl flex justify-center items-center gap-2 transition-all shadow-sm">
                    <i data-lucide="wand-2" class="w-4 h-4"></i> +9 Soal Pintar
                </button>
                <button onclick="hapusSemuaLevel()" class="bg-rose-500 hover:bg-rose-600 text-white font-black p-3 rounded-xl flex justify-center items-center gap-2 transition-all shadow-sm">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Hapus Semua
                </button>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 mt-4">
                <div class="flex justify-between items-center mb-4 pb-3 border-b-2 border-slate-100">
                    <h2 class="font-black text-xl text-slate-800">Daftar Level (<span id="total-level">0</span>)</h2>
                    <button onclick="bukaFormTambah()" class="bg-sky-100 text-sky-700 font-black px-4 py-2 rounded-xl text-sm flex gap-1 items-center hover:bg-sky-200 transition"><i data-lucide="plus" class="w-5 h-5"></i> BUAT BARU</button>
                </div>
                <div id="daftar-soal-admin" class="space-y-3"></div>
            </div>
        </main>

        <div class="fixed bottom-0 w-full max-w-[600px] p-5 bg-white/90 backdrop-blur border-t-2 z-40 flex gap-2">
            <button onclick="publishKeGitHub()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black text-xl py-4 rounded-2xl shadow-[0_8px_0_0_#059669] active:translate-y-2 active:shadow-none flex justify-center items-center gap-2 transition-all">
                <i data-lucide="upload-cloud"></i> SIMPAN & PUBLISH

                            <div class="flex gap-2 mb-1">

                                <button onclick="Galeri.bukaUtama('path-lvl-soal', 'audio')" class="bg-sky-200 text-sky-800 p-2 rounded hover:bg-sky-300"><i data-lucide="folder-search" class="w-4 h-4"></i></button>

                                <button onclick="Galeri.bukaUtama('path-lvl-bg', 'image')" class="bg-sky-200 text-sky-800 p-2 rounded hover:bg-sky-300"><i data-lucide="folder-search" class="w-4 h-4"></i></button>

                <div id="wadah-kuis-drag">
                    <div class="bg-emerald-50 p-5 rounded-3xl border border-emerald-300 shadow-sm mb-4">
                        <label class="font-black text-lg block mb-3 text-emerald-800 flex items-center gap-2"><i data-lucide="check-circle-2"></i> GAMBAR UTAMA / TARGET</label>

                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-p2-img" class="w-full text-[10px] p-2 border border-rose-200 rounded bg-white" placeholder="Pilih Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-p2-img', 'image')" class="bg-rose-200 text-rose-800 p-2 rounded hover:bg-rose-300"><i data-lucide="folder-search" class="w-3 h-3"></i></button>

                            <div class="flex gap-2 mb-1">
                                <input type="text" id="path-p3-img" class="w-full text-[10px] p-2 border border-rose-200 rounded bg-white" placeholder="Pilih Galeri ->" readonly>
                                <button onclick="Galeri.bukaUtama('path-p3-img', 'image')" class="bg-rose-200 text-rose-800 p-2 rounded hover:bg-rose-300"><i data-lucide="folder-search" class="w-3 h-3"></i></button>

                    <i data-lucide="save"></i> SIMPAN LEVEL INI
                </button>

    <script>
        lucide.createIcons();

        let dbLokal = { global_settings: {}, levels: [] };
        let antreanFile = []; let fileYangHarusDihapus = []; 

        function uiToast(msg, type='success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-enter px-6 py-3 rounded-full font-bold text-sm shadow-xl flex items-center gap-2 ${type==='success' ? 'bg-emerald-500 text-white' : (type==='error' ? 'bg-rose-500 text-white' : (type==='info' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-white'))}`;
            toast.innerHTML = `<i data-lucide="${type==='success' ? 'check-circle' : (type==='error' ? 'alert-circle' : 'info')}" class="w-5 h-5"></i> ${msg}`;
            container.appendChild(toast); lucide.createIcons();
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-leave'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function uiConfirm(msg) {
            return new Promise((resolve) => {
                const modal = document.getElementById('modal-confirm');
                document.getElementById('confirm-text').innerText = msg;
                modal.classList.remove('hidden');
                document.getElementById('btn-confirm-yes').onclick = () => { modal.classList.add('hidden'); resolve(true); };
                document.getElementById('btn-confirm-no').onclick = () => { modal.classList.add('hidden'); resolve(false); };
            });
        }

        function bukaModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function tutupModal(id) { document.getElementById(id).classList.add('hidden'); }

        function renderSlotUrutan() {
            const wadah = document.getElementById('wadah-slot-urutan'); let html = '';
            for(let i=1; i<=6; i++) {
                html += `
                <div class="bg-white p-3 rounded-xl border border-indigo-200 flex gap-2 items-center">
                    <div class="font-black text-indigo-400 text-xl px-2 w-6">${i}</div>
                    <div class="flex-1">
                        <input type="text" id="in-u${i}-nama" placeholder="Teks Urutan ${i}" class="w-full p-2 border border-indigo-100 rounded mb-1 text-sm font-bold">
                        <div class="flex gap-2 mb-1">
                            <input type="text" id="path-u${i}-img" class="w-full text-[10px] p-2 border border-indigo-100 rounded bg-slate-50" placeholder="Pilih Galeri ->" readonly>
                            <button onclick="Galeri.bukaUtama('path-u${i}-img', 'image')" class="bg-indigo-100 text-indigo-700 p-2 rounded hover:bg-indigo-200"><i data-lucide="folder-search" class="w-4 h-4"></i></button>
                        </div>
                        <input type="file" id="f-u${i}-img" accept="image/*" class="w-full text-xs">
                    </div>
                </div>`;
            }
            wadah.innerHTML = html;
        }
        renderSlotUrutan();

        function UbahTampilanForm() {
            const val = document.getElementById('in-kategori').value;
            if(val === 'urutan' || val === 'melayang') {

            async buatAcak9() {
                const isYes = await uiConfirm("Generate 9 soal Pintar (Anti-Duplikat) untuk semua 9 kategori game?"); if(!isYes) return;
                const tsBase = Date.now();
                
                const generators = [
                    this.bikinKuis.bind(this), this.bikinDrag.bind(this), this.bikinSiluet.bind(this),
                    this.bikinUrutan.bind(this), this.bikinMemory.bind(this), this.bikinTebakKata.bind(this),
                    this.bikinBubble.bind(this), this.bikinMelayang.bind(this), this.bikinPukul.bind(this)
                ];

                let jumlahBerhasil = 0;

                generators.forEach((gen, i) => {
                    let sb;
                    let batasPercobaan = 25; // Batas wajar mengocok soal agar tidak freeze
                    let percobaan = 0;
                    let duplikat = true;

                    // Mengocok ulang terus menerus jika pertanyaan sudah ada di database
                    while (duplikat && percobaan < batasPercobaan) {
                        sb = gen();
                        duplikat = this.apakahSudahAda(sb.pertanyaan);
                        percobaan++;
                    }

                    // Memasukkan ke list jika soal benar-benar unik
                    if (!duplikat) {
                        sb.id = `L_AUTO_${tsBase}_${i}`; 
                        dbLokal.levels.push(sb);
                        jumlahBerhasil++;
                    }
                });

                renderDaftarLevel(); 
                
                if (jumlahBerhasil === 9) {
                    uiToast("9 Soal baru & UNIK ditambahkan! Jangan lupa Publish.", "success");
                } else {
                    uiToast(`Ditambahkan ${jumlahBerhasil} soal unik. (Beberapa di-skip karena level ini sudah ada di map)`, "info");
                }
            }
        };

            try {
                const reqOpt = forceRefresh ? { headers: { 'Authorization': `token ${token}` }, cache: 'no-store' } : { headers: { 'Authorization': `token ${token}` } };
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/public/data-soal.json?v=${Date.now()}`, reqOpt);
                clearInterval(intv);
                if(res.ok) {
                    const data = await res.json(); const parsed = JSON.parse(decodeURIComponent(escape(window.atob(data.content))));
                    dbLokal.global_settings = parsed.global_settings || {}; dbLokal.levels = parsed.levels || []; document.getElementById('total-level').innerText = dbLokal.levels.length;
                    icon.setAttribute('data-lucide', 'check-circle'); icon.classList.remove('animate-spin', 'text-indigo-500'); icon.classList.add('text-emerald-500');
                    text.innerText = "Terhubung: " + repo; text.className = "text-emerald-800";
                    statusEl.className = "bg-emerald-50 border-2 border-emerald-200 p-4 rounded-2xl text-sm font-bold flex items-center justify-between shadow-sm transition-colors";
                    if(forceRefresh) uiToast("Berhasil menarik data!");
                } else if (res.status === 404) {
                    dbLokal = { global_settings: {}, levels: [] }; document.getElementById('total-level').innerText = 0;
                    icon.setAttribute('data-lucide', 'info'); icon.classList.remove('animate-spin', 'text-indigo-500'); icon.classList.add('text-sky-500');
                    text.innerText = "Repo Kosong."; text.className = "text-sky-800";
                    statusEl.className = "bg-sky-50 border-2 border-sky-200 p-4 rounded-2xl text-sm font-bold flex items-center justify-between shadow-sm transition-colors";
                } else throw new Error(`Akses Ditolak.`);
            } catch(e) { 
                clearInterval(intv); icon.setAttribute('data-lucide', 'x-circle'); icon.classList.remove('animate-spin', 'text-indigo-500'); icon.classList.add('text-rose-500');
                text.innerText = "Error: " + e.message; text.className = "text-rose-800";
                statusEl.className = "bg-rose-50 border-2 border-rose-200 p-4 rounded-2xl text-sm font-bold flex items-center justify-between shadow-sm transition-colors";
                if(forceRefresh) uiToast("Gagal menarik data", "error");
            }
            if(btnSync) btnSync.classList.remove('animate-spin'); lucide.createIcons(); renderDaftarLevel();
        }

        function renderDaftarLevel() {
            const wadah = document.getElementById('daftar-soal-admin'); wadah.innerHTML = ''; document.getElementById('total-level').innerText = dbLokal.levels ? dbLokal.levels.length : 0;
            if(!dbLokal.levels || dbLokal.levels.length === 0) return wadah.innerHTML = `<div class="text-center p-10"><p class="text-slate-400 font-bold">Belum ada Level.</p></div>`;
            dbLokal.levels.forEach((lvl, idx) => {
                wadah.innerHTML += `
                    <div class="border border-slate-200 p-4 rounded-2xl flex justify-between items-center bg-white shadow-sm hover:border-indigo-300">
                        <div class="overflow-hidden"><span class="text-[10px] font-black text-white uppercase px-2 py-1 bg-indigo-500 rounded-lg">${lvl.kategori}</span><span class="text-sm font-black text-slate-400 ml-2">Level ${idx + 1}</span><h3 class="font-bold text-base text-slate-800 mt-1 truncate w-48 sm:w-64">${lvl.pertanyaan}</h3></div>
                        <div class="flex gap-2"><button onclick="bukaFormEdit(${idx})" class="text-indigo-600 bg-indigo-50 p-3 rounded-xl hover:bg-indigo-600 hover:text-white transition"><i data-lucide="edit-3" class="w-5 h-5"></i></button><button onclick="hapusLevel(${idx})" class="text-rose-600 bg-rose-50 p-3 rounded-xl hover:bg-rose-600 hover:text-white transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button></div>
                    </div>`;
            }); lucide.createIcons();
        }

        function daftarAsetLevelIni(dataLevel) {
            let list = [];
            if(dataLevel.bg_image) list.push(`public/${dataLevel.bg_image}`);
            if(dataLevel.media_soal) list.push(`public/${dataLevel.media_soal}`);
            if(dataLevel.audio_soal) list.push(`public/${dataLevel.audio_soal}`);
            if(dataLevel.bgm_level) list.push(`public/${dataLevel.bgm_level}`);
            
            if(dataLevel.kategori === 'urutan' || dataLevel.kategori === 'melayang') {
                if(dataLevel.item_urutan) dataLevel.item_urutan.forEach(u => { if(u.url_gambar) list.push(`public/${u.url_gambar}`); });
            } else {
                if(dataLevel.item_target && dataLevel.item_target.url_gambar) list.push(`public/${dataLevel.item_target.url_gambar}`);
                if(dataLevel.item_pengecoh) dataLevel.item_pengecoh.forEach(pgc => { if(pgc.url_gambar) list.push(`public/${pgc.url_gambar}`); });
            }
            return list;
        }

        async function hapusLevel(idx) { 
            const isYes = await uiConfirm("Hapus level ini?");
            if(isYes) { 
                const asetT = daftarAsetLevelIni(dbLokal.levels[idx]);
                fileYangHarusDihapus = [...fileYangHarusDihapus, ...asetT];
                dbLokal.levels.splice(idx, 1); 
                renderDaftarLevel(); 
                uiToast("Level dihapus sementara. Klik Publish untuk eksekusi.");
            } 
        }

        function bukaFormTambah() {
            document.getElementById('judul-modal-form').innerText = "Buat Level Baru"; document.getElementById('edit-index').value = "-1"; 
            document.querySelectorAll('#modal-soal input[type="text"], #modal-soal textarea').forEach(el => el.value = ''); document.querySelectorAll('#modal-soal input[type="file"]').forEach(el => el.value = '');
            document.getElementById('in-kategori').value = 'kuis'; document.getElementById('in-speed').value = 'normal'; UbahTampilanForm(); bukaModal('modal-soal');
        }

        function bukaFormEdit(idx) {
            const data = dbLokal.levels[idx];
            document.getElementById('judul-modal-form').innerText = `Edit Level ${idx + 1}`; document.getElementById('edit-index').value = idx; 
            document.getElementById('in-kategori').value = data.kategori || 'kuis'; document.getElementById('in-speed').value = data.speed || 'normal'; UbahTampilanForm();
            document.getElementById('in-tanya').value = data.pertanyaan; document.getElementById('path-media-soal').value = data.media_soal || "";
            document.getElementById('path-lvl-bg').value = data.bg_image || ""; document.getElementById('path-lvl-bgm').value = data.bgm_level || ""; document.getElementById('path-lvl-soal').value = data.audio_soal || "";

            if (data.kategori === 'urutan' || data.kategori === 'melayang') {
                if(data.item_urutan) { for(let i=0; i<6; i++) { if(data.item_urutan[i]) { document.getElementById(`in-u${i+1}-nama`).value = data.item_urutan[i].nama; document.getElementById(`path-u${i+1}-img`).value = data.item_urutan[i].url_gambar||""; } } }
            } else {
                document.getElementById('in-benar-nama').value = data.item_target ? data.item_target.nama : ""; document.getElementById('path-benar-img').value = data.item_target ? data.item_target.url_gambar : "";
                if(data.item_pengecoh) { for(let i=0; i<3; i++) { if(data.item_pengecoh[i]) { document.getElementById(`in-p${i+1}-nama`).value = data.item_pengecoh[i].nama; document.getElementById(`path-p${i+1}-img`).value = data.item_pengecoh[i].url_gambar||""; } } }
            }
            document.querySelectorAll('#modal-soal input[type="file"]').forEach(el => el.value = ''); bukaModal('modal-soal');
        }

        function simpanLevelKeDaftar() {
            const ts = Date.now(); const idxEdit = parseInt(document.getElementById('edit-index').value); const kategori = document.getElementById('in-kategori').value; const tanya = document.getElementById('in-tanya').value.trim(); const speed = document.getElementById('in-speed').value;
            if(!tanya) return uiToast("Pertanyaan WAJIB diisi!", "error");
            if(!dbLokal.levels) dbLokal.levels = [];
            let objLevel = { id: `L_${ts}`, kategori: kategori, pertanyaan: tanya, speed: speed };

            const cekM = (idF, idP, prp, prx) => {
                const f = document.getElementById(idF).files[0]; const p = document.getElementById(idP).value;
                if(f) { 
                    if(idxEdit > -1 && dbLokal.levels[idxEdit][prp]) fileYangHarusDihapus.push(`public/${dbLokal.levels[idxEdit][prp]}`);
                    objLevel[prp] = `assets/${prx}_${ts}.${f.name.split('.').pop()}`; antreanFile.push({path: `public/${objLevel[prp]}`, file: f}); 
                } else if(p) { objLevel[prp] = p; } else { objLevel[prp] = null; }
            };
            cekM('f-media-soal', 'path-media-soal', 'media_soal', 'msoal');
            cekM('f-lvl-bg', 'path-lvl-bg', 'bg_image', 'bg');
            cekM('f-lvl-bgm', 'path-lvl-bgm', 'bgm_level', 'bgm');
            cekM('f-lvl-soal', 'path-lvl-soal', 'audio_soal', 'asoal');

            if (kategori === 'urutan' || kategori === 'melayang') {
                objLevel.item_urutan = [];
                for(let i=1; i<=6; i++) {
                    const nm = document.getElementById(`in-u${i}-nama`).value; const fU = document.getElementById(`f-u${i}-img`).files[0]; const pU = document.getElementById(`path-u${i}-img`).value;
                    if(nm || fU || pU) {
                        let uObj = { indexAsli: objLevel.item_urutan.length, nama: nm || `Ke-${i}` };
                        if(fU) { 
                            if(idxEdit > -1 && dbLokal.levels[idxEdit].item_urutan && dbLokal.levels[idxEdit].item_urutan[i-1] && dbLokal.levels[idxEdit].item_urutan[i-1].url_gambar) fileYangHarusDihapus.push(`public/${dbLokal.levels[idxEdit].item_urutan[i-1].url_gambar}`);
                            uObj.url_gambar = `assets/u${i}_${ts}.${fU.name.split('.').pop()}`; antreanFile.push({path: `public/${uObj.url_gambar}`, file: fU}); 
                        } else if(pU) { uObj.url_gambar = pU; }
                        objLevel.item_urutan.push(uObj);
                    }
                }
            } else {
                objLevel.item_target = { isTarget: true }; objLevel.item_target.nama = document.getElementById('in-benar-nama').value || "Benar";
                const fB = document.getElementById('f-benar-img').files[0]; const pB = document.getElementById('path-benar-img').value;
                if(fB) { 
                    if(idxEdit > -1 && dbLokal.levels[idxEdit].item_target && dbLokal.levels[idxEdit].item_target.url_gambar) fileYangHarusDihapus.push(`public/${dbLokal.levels[idxEdit].item_target.url_gambar}`);
                    objLevel.item_target.url_gambar = `assets/tgt_${ts}.${fB.name.split('.').pop()}`; antreanFile.push({path: `public/${objLevel.item_target.url_gambar}`, file: fB}); 
                } else if(pB) { objLevel.item_target.url_gambar = pB; }
                
                objLevel.item_pengecoh = [];
                for(let i=1; i<=3; i++) {
                    const nm = document.getElementById(`in-p${i}-nama`).value; const fP = document.getElementById(`f-p${i}-img`).files[0]; const pP = document.getElementById(`path-p${i}-img`).value;
                    if(nm || fP || pP) {
                        let pObj = { nama: nm || "Pilihan", isTarget: false };
                        if(fP) { 
                            if(idxEdit > -1 && dbLokal.levels[idxEdit].item_pengecoh && dbLokal.levels[idxEdit].item_pengecoh[i-1] && dbLokal.levels[idxEdit].item_pengecoh[i-1].url_gambar) fileYangHarusDihapus.push(`public/${dbLokal.levels[idxEdit].item_pengecoh[i-1].url_gambar}`);
                            pObj.url_gambar = `assets/p${i}_${ts}.${fP.name.split('.').pop()}`; antreanFile.push({path: `public/${pObj.url_gambar}`, file: fP}); 
                        } else if(pP) { pObj.url_gambar = pP; }
                        objLevel.item_pengecoh.push(pObj);
                    }
                }
            }
            if (idxEdit > -1) dbLokal.levels[idxEdit] = objLevel; else dbLokal.levels.push(objLevel);
            renderDaftarLevel(); tutupModal('modal-soal'); uiToast("Level disimpan sementara.");
        }

        const Galeri = {
            targetInputId: null, filterType: 'all', 
            bukaUtama(inputId, type) { this.targetInputId = inputId; this.filterType = type; document.getElementById('modal-galeri').classList.remove('hidden'); this.fetchDataGitHub(); },
            tutup() { document.getElementById('modal-galeri').classList.add('hidden'); },
            async fetchDataGitHub() {
                const token = localStorage.getItem('ghToken'); const repo = localStorage.getItem('ghRepo');
                const grid = document.getElementById('galeri-grid'); const loader = document.getElementById('galeri-loading');
                grid.innerHTML = ''; loader.classList.remove('hidden');
                try {
                    const res = await fetch(`https://api.github.com/repos/${repo}/contents/public/assets?v=${Date.now()}`, { headers: { 'Authorization': `token ${token}` } });
                    loader.classList.add('hidden');
                    if(res.ok) {
                        const files = await res.json();
                        if(files.length === 0) return grid.innerHTML = `<p class="col-span-3 text-center">Belum ada aset.</p>`;
                        files.forEach(file => {
                            const isImage = file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i); const isAudio = file.name.match(/\.(mp3|wav|ogg|m4a)$/i);
                            if (this.filterType === 'image' && !isImage) return; if (this.filterType === 'audio' && !isAudio) return;
                            const btn = document.createElement('div'); btn.className = "bg-white p-2 rounded-xl shadow-sm border border-slate-200 cursor-pointer text-center hover:border-indigo-400"; btn.onclick = () => this.pilihAset(`assets/${file.name}`);
                            if (isImage) btn.innerHTML = `<img src="https://raw.githubusercontent.com/${repo}/main/public/assets/${file.name}" class="w-full h-16 object-cover rounded-lg mb-1"><span class="text-[9px] truncate w-full inline-block px-1">${file.name}</span>`;
                            else btn.innerHTML = `<div class="w-full h-16 bg-indigo-50 rounded-lg mb-1 flex items-center justify-center"><i data-lucide="music" class="w-8 h-8 text-indigo-300"></i></div><span class="text-[9px] truncate w-full inline-block px-1">${file.name}</span>`;
                            grid.appendChild(btn);
                        }); lucide.createIcons();
                    } else throw new Error();
                } catch(e) { loader.classList.add('hidden'); grid.innerHTML = `<p class="col-span-3 text-center text-rose-500 font-bold">Folder Aset kosong.</p>`; }
            },
            pilihAset(pathStr) { if (this.targetInputId) document.getElementById(this.targetInputId).value = pathStr; this.tutup(); }
        };

        const ubahFileKeBase64 = (file) => new Promise((r) => { const rd = new FileReader(); rd.readAsDataURL(file); rd.onload = () => { let b64 = rd.result.replace(/^data:(.*,)?/, ''); if(b64.length%4>0) b64 += '='.repeat(4-(b64.length%4)); r(b64); }; });
        
        async function githubPutRequest(token, repo, path, base64Content) {
            const url = `https://api.github.com/repos/${repo}/contents/${path}`; let sha = null;
            try { const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } }); if(getRes.ok) sha = (await getRes.json()).sha; } catch(e) {} 
            const bodyData = { message: `CMS Update: ${path}`, content: base64Content }; if (sha) bodyData.sha = sha;
            const putRes = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData) });
            if(!putRes.ok) throw new Error(`Upload Gagal: ${path}`);
        }

        async function githubDeleteRequest(token, repo, path) {
            const url = `https://api.github.com/repos/${repo}/contents/${path}`;
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                if(getRes.ok) {
                    const sha = (await getRes.json()).sha;
                    await fetch(url, { method: 'DELETE', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `CMS Auto Delete: ${path}`, sha: sha }) });
                }
            } catch(e) {}
        }

        async function publishKeGitHub() {
            const token = localStorage.getItem('ghToken'); const repo = localStorage.getItem('ghRepo');
            if(!token || !repo) return uiToast("Hubungkan Token GitHub!", "error");
            const modLoad = document.getElementById('modal-loading'); const tLoad = document.getElementById('loading-teks'); const pubBar = document.getElementById('publish-bar');
            modLoad.classList.remove('hidden'); pubBar.style.width = '10%';

            try {
                let currentProg = 10; const totalFiles = antreanFile.length + fileYangHarusDihapus.length + 1; const step = 90 / totalFiles;

                for(let i=0; i<fileYangHarusDihapus.length; i++) {
                    tLoad.innerText = `Menghapus file sampah ${i+1}/${fileYangHarusDihapus.length}...`;
                    await githubDeleteRequest(token, repo, fileYangHarusDihapus[i]);
                    currentProg += step; pubBar.style.width = `${currentProg}%`;
                }

                for(let i=0; i<antreanFile.length; i++) {
                    tLoad.innerText = `Upload media ${i+1}/${antreanFile.length}...`;
                    await githubPutRequest(token, repo, antreanFile[i].path, await ubahFileKeBase64(antreanFile[i].file));
                    currentProg += step; pubBar.style.width = `${currentProg}%`;
                }
                
                tLoad.innerText = `Menyinkronkan Database...`; pubBar.style.width = `95%`;
                const jsonStr = JSON.stringify(dbLokal, null, 2); const jsonB64 = window.btoa(unescape(encodeURIComponent(jsonStr)));
                await githubPutRequest(token, repo, 'public/data-soal.json', jsonB64);
                
                pubBar.style.width = `100%`; tLoad.innerText = `SELESAI!`;
                antreanFile = []; fileYangHarusDihapus = []; 
                
                setTimeout(() => { modLoad.classList.add('hidden'); uiToast("Semua data berhasil disimpan ke Server!"); }, 1000);
            } catch(e) { uiToast("ERROR: " + e.message, "error"); modLoad.classList.add('hidden'); }
        }
    </script>
</body>
</html>
